<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>课程管理系统 - Editor 后台</title>
<style>
:root {
  --bg: #f5f6fa; --card: #fff; --border: #e2e5e9; --text: #2d3436; --muted: #636e72;
  --primary: #0984e3; --success: #00b894; --warning: #fdcb6e; --danger: #d63031;
  --shadow: 0 2px 8px rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hidden{display:none!important}

/* Header */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:700}
.header .user{font-size:13px;color:var(--muted)}
.header .user span{color:var(--primary);font-weight:600}

/* Nav */
.nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:4px}
.nav a{padding:12px 16px;font-size:13px;text-decoration:none;color:var(--muted);border-bottom:2px solid transparent;transition:.15s}
.nav a.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.nav .badge{background:var(--primary);color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px}

/* Main */
.main{padding:24px;max-width:1400px;margin:0 auto}

/* Toolbar */
.toolbar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar input[type=text]{padding:8px 12px;border:1px solid var(--border);border-radius:6px;width:240px;font-size:13px}
.toolbar select{padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--card)}
.toolbar .spacer{flex:1}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;transition:.15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-success{background:var(--success);color:#fff}
.btn-warning{background:var(--warning);color:#2d3436}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:var(--card);border:1px solid var(--border);color:var(--text)}
.btn-sm{padding:4px 10px;font-size:12px}

/* Table */
.table-wrap{background:var(--card);border-radius:10px;box-shadow:var(--shadow);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8f9fa;padding:10px 12px;text-align:left;font-weight:600;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--primary)}
th .sort-arrow{font-size:10px;margin-left:2px}
td{padding:10px 12px;border-bottom:1px solid #f1f2f6}
tr:hover{background:#f8f9fb}
tr.archived{background:#fff5f5;color:var(--muted)}
tr.archived td{text-decoration:line-through;text-decoration-thickness:1px}

/* Tags & Status */
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.tag-draft{background:#dfe6e9;color:#636e72}
.tag-published{background:#d5f5e3;color:#00b894}
.tag-progress{background:#d6eaf8;color:#0984e3}
.tag-completed{background:#e8daef;color:#8e44ad}
.tag-archived{background:#fadbd8;color:#d63031}
.tag-online{background:#d6eaf8;color:#0984e3}
.tag-offline{background:#fdebd0;color:#e67e22}
.tag-hybrid{background:#d5f5e3;color:#27ae60}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;font-size:13px}
.pagination .pages{display:flex;gap:4px}
.pagination button,.pagination select{padding:6px 10px;border:1px solid var(--border);border-radius:4px;background:var(--card);cursor:pointer;font-size:12px}
.pagination button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.pagination button:disabled{opacity:.4;cursor:default}

/* Form */
.form-card{background:var(--card);border-radius:10px;box-shadow:var(--shadow);padding:24px;max-width:800px;margin:0 auto}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.form-group label .required{color:var(--danger)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px}
.form-group textarea{min-height:80px;resize:vertical}
.form-group input.error,.form-group select.error,.form-group textarea.error{border-color:var(--danger);background:#fff5f5}
.form-group .err-msg{font-size:11px;color:var(--danger);margin-top:4px;display:none}
.form-group input.error+.err-msg,.form-group select.error+.err-msg,.form-group textarea.error+.err-msg{display:block}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* Cover */
.cover-preview{width:200px;height:120px;border-radius:8px;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:8px;overflow:hidden;background:#f8f9fa}
.cover-preview img{width:100%;height:100%;object-fit:cover}
.cover-preview .placeholder{color:var(--muted);font-size:12px}

/* Schedule */
.schedule-list{list-style:none}
.schedule-item{display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid #f1f2f6}
.schedule-item input{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:4px;font-size:13px}
.schedule-item .btn-sm{flex-shrink:0}
.schedule-item.deleted{background:#fff5f5;opacity:.6}
.schedule-item.deleted .deleted-tag{color:var(--danger);font-size:11px;font-weight:600}

/* Buttons row */
.form-actions{display:flex;gap:12px;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}

/* Teacher */
.teacher-select{display:flex;gap:8px;align-items:center}
.teacher-select select{flex:1}
.selected-teacher{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.teacher-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:#d6eaf8;border-radius:12px;font-size:12px}
.teacher-tag .remove-teacher{cursor:pointer;font-weight:700;color:var(--danger)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--card);border-radius:12px;padding:24px;min-width:360px;max-width:500px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal h3{margin-bottom:12px}
.modal .modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.modal .version-item{padding:6px 0;border-bottom:1px solid #f1f2f6;font-size:13px;cursor:pointer}
.modal .version-item:hover{color:var(--primary)}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;color:#fff;font-size:13px;font-weight:600;z-index:200;animation:slideIn .3s}
.toast-success{background:var(--success)}
.toast-error{background:var(--danger)}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Checkbox */
input[type=checkbox]{margin-right:8px}

/* Empty */
.empty-state{text-align:center;padding:40px;color:var(--muted)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>📚 教育培训平台 · 后台管理</h1>
  <div class="user">当前用户：<span id="currentUser">王编辑</span>（Editor）</div>
</div>

<!-- Nav -->
<div class="nav">
  <a href="#" class="active" onclick="showListing()">📋 课程管理</a>
  <a href="#" onclick="showDrafts()">📝 草稿列表 <span class="badge" id="draftCount">0</span></a>
</div>

<!-- Main Content -->
<div class="main" id="mainContent"></div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script>
// ===== 数据模型 =====
const DEFAULT_COVER = 'data:image/svg+xml,' + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="200" height="120" fill="#dfe6e9"><rect width="200" height="120"/><text x="100" y="65" text-anchor="middle" fill="#636e72" font-size="14">暂无封面</text></svg>'
);

// 预设老师
const DEFAULT_TEACHERS = [
  { id:'T001', name:'张老师', subject:'Python/数据分析', email:'zhang@edu.cn' },
  { id:'T002', name:'李老师', subject:'Java/后端开发', email:'li@edu.cn' },
  { id:'T003', name:'王老师', subject:'前端/Vue/React', email:'wang@edu.cn' },
  { id:'T004', name:'赵老师', subject:'AI/机器学习', email:'zhao@edu.cn' },
  { id:'T005', name:'陈老师', subject:'UI设计/Figma', email:'chen@edu.cn' },
];

function getDefaultCourses() {
  return [
    { course_id:'C001', title:'Python 数据分析实战', description:'从零基础到能独立完成数据分析项目', cover:null,
      type:'online', tags:['python','data','beginner'], trainer_ids:['T001'],
      schedule:[{date:'2026-07-15', time:'09:00-12:00'},{date:'2026-07-16', time:'09:00-12:00'}],
      price_original:3000, status:'published', version:1, archived:false, created_at:'2026-07-01', updated_at:'2026-07-01' },
    { course_id:'C002', title:'Java 后端开发训练营', description:'Spring Boot + MyBatis 全栈实战', cover:null,
      type:'offline', tags:['java','backend'], trainer_ids:['T002'],
      schedule:[{date:'2026-08-01', time:'14:00-17:00'}],
      price_original:5000, status:'published', version:1, archived:false, created_at:'2026-07-03', updated_at:'2026-07-03' },
    { course_id:'C003', title:'AI 产品经理入门', description:'从需求到上线，AI PM 全流程', cover:null,
      type:'hybrid', tags:['ai','pm','beginner'], trainer_ids:['T004'],
      schedule:[{date:'2026-07-20', time:'10:00-12:00'},{date:'2026-07-21', time:'10:00-12:00'},{date:'2026-07-22', time:'10:00-12:00'}],
      price_original:4500, status:'published', version:1, archived:false, created_at:'2026-06-28', updated_at:'2026-06-28' },
  ];
}

// ===== 存储 =====
function load(key, fallback) {
  try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : fallback; }
  catch(e) { return fallback; }
}
function save(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

let teachers = load('edu_teachers', DEFAULT_TEACHERS);
let courses = load('edu_courses', getDefaultCourses());
let drafts = load('edu_drafts', []);
let courseIdCounter = load('edu_courseCounter', 3);

// ===== 工具函数 =====
function now() { return new Date().toISOString().split('T')[0]; }
function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast toast-'+type;
  setTimeout(() => t.classList.add('hidden'), 2500);
}
function statusTag(s) {
  const map = {draft:'tag-draft',published:'tag-published',in_progress:'tag-progress',completed:'tag-completed',archived:'tag-archived'};
  const label = {draft:'草稿',published:'已发布',in_progress:'进行中',completed:'已完成',archived:'已归档'};
  return `<span class="tag ${map[s]||''}">${label[s]||s}</span>`;
}
function typeTag(t) {
  const map = {online:'tag-online',offline:'tag-offline',hybrid:'tag-hybrid'};
  return `<span class="tag ${map[t]||''}">${t||''}</span>`;
}
function getTeacherNames(ids) { return (ids||[]).map(id => (teachers.find(t=>t.id===id)||{}).name||id).join(', '); }

// ===== 页面渲染 =====
let currentView = 'listing';
let listSortField = 'created_at';
let listSortDesc = true;
let listSearch = '';
let listFilterStatus = '';
let listFilterType = '';
let listFilterTeacher = '';
let listPage = 1;
let listPageSize = 10;
let selectedIds = new Set();

function showListing() {
  currentView = 'listing';
  selectedIds.clear();
  render();
}

function showDrafts() {
  currentView = 'drafts';
  render();
}

function render() {
  document.querySelectorAll('.nav a').forEach((a,i) => {
    a.classList.toggle('active', (i===0 && currentView==='listing') || (i===1 && currentView==='drafts'));
  });
  document.getElementById('draftCount').textContent = drafts.length;

  if (currentView === 'listing') renderListing();
  else if (currentView === 'drafts') renderDrafts();
  else if (currentView === 'create') renderCreateForm();
  else if (currentView === 'edit') renderEditForm();
}

// ===== Listing =====
function renderListing() {
  let filtered = courses.filter(c => !c.archived && c.status !== 'draft');
  if (listSearch) {
    const q = listSearch.toLowerCase();
    filtered = filtered.filter(c => c.title.toLowerCase().includes(q) || (c.description||'').toLowerCase().includes(q));
  }
  if (listFilterStatus) filtered = filtered.filter(c => c.status === listFilterStatus);
  if (listFilterType) filtered = filtered.filter(c => c.type === listFilterType);

  filtered.sort((a,b) => {
    let va = a[listSortField], vb = b[listSortField];
    if (typeof va === 'string') va = va.toLowerCase(), vb = (vb||'').toLowerCase();
    if (va < vb) return listSortDesc ? 1 : -1;
    if (va > vb) return listSortDesc ? -1 : 1;
    return 0;
  });

  const totalPages = Math.ceil(filtered.length / listPageSize) || 1;
  if (listPage > totalPages) listPage = totalPages;
  const start = (listPage - 1) * listPageSize;
  const pageItems = filtered.slice(start, start + listPageSize);

  const archivedCourses = courses.filter(c => c.archived);

  let html = `
  <div class="toolbar">
    <input type="text" placeholder="🔍 搜索课程名称或描述..." value="${listSearch}" oninput="listSearch=this.value;listPage=1;renderListing()">
    <select onchange="listFilterStatus=this.value;listPage=1;renderListing()">
      <option value="">全部状态</option>
      <option value="published" ${listFilterStatus==='published'?'selected':''}>已发布</option>
      <option value="in_progress" ${listFilterStatus==='in_progress'?'selected':''}>进行中</option>
      <option value="completed" ${listFilterStatus==='completed'?'selected':''}>已完成</option>
    </select>
    <select onchange="listFilterType=this.value;listPage=1;renderListing()">
      <option value="">全部类型</option>
      <option value="online" ${listFilterType==='online'?'selected':''}>在线</option>
      <option value="offline" ${listFilterType==='offline'?'selected':''}>线下</option>
      <option value="hybrid" ${listFilterType==='hybrid'?'selected':''}>混合</option>
    </select>
    <select onchange="listFilterTeacher=this.value;listPage=1;renderListing()">
      <option value="">全部老师</option>
      ${teachers.map(t => `<option value="${t.id}" ${listFilterTeacher===t.id?'selected':''}>${t.name}</option>`).join('')}
    </select>
    <span class="spacer"></span>
    <button class="btn btn-outline btn-sm" onclick="selectedIds.size>0?batchPublish():toast('请先勾选课程','error')">📢 批量发布</button>
    <button class="btn btn-outline btn-sm" onclick="selectedIds.size>0?batchArchive():toast('请先勾选课程','error')">📦 批量归档</button>
    <button class="btn btn-primary" onclick="openCreate()">+ 新增课程</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:32px"><input type="checkbox" onchange="toggleAll(this)" ${pageItems.length===0?'disabled':''}></th>
          <th onclick="sortBy('course_id')">ID ${sortArrow('course_id')}</th>
          <th onclick="sortBy('title')">课程名称 ${sortArrow('title')}</th>
          <th onclick="sortBy('type')">类型 ${sortArrow('type')}</th>
          <th onclick="sortBy('status')">状态 ${sortArrow('status')}</th>
          <th>老师</th>
          <th onclick="sortBy('schedule')">排期数 ${sortArrow('schedule')}</th>
          <th onclick="sortBy('price_original')">价格 ${sortArrow('price_original')}</th>
          <th>标签</th>
          <th onclick="sortBy('created_at')">创建时间 ${sortArrow('created_at')}</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        ${pageItems.length === 0 ? `<tr><td colspan="11"><div class="empty-state"><div class="icon">📭</div>没有匹配的课程</div></td></tr>` :
          pageItems.map(c => `
          <tr>
            <td><input type="checkbox" ${selectedIds.has(c.course_id)?'checked':''} onchange="toggleSelect('${c.course_id}',this)"></td>
            <td>${c.course_id}</td>
            <td><strong>${c.title}</strong></td>
            <td>${typeTag(c.type)}</td>
            <td>${statusTag(c.status)}</td>
            <td>${getTeacherNames(c.trainer_ids)}</td>
            <td>${(c.schedule||[]).length} 次</td>
            <td>¥${c.price_original}</td>
            <td>${(c.tags||[]).map(t=>`<span class="tag tag-draft">${t}</span>`).join(' ')}</td>
            <td>${c.created_at}</td>
            <td style="white-space:nowrap">
              ${c.status==='draft' ? `<button class="btn btn-success btn-sm" onclick="quickPublish('${c.course_id}')">发布</button>` : ''}
              <button class="btn btn-outline btn-sm" onclick="openEdit('${c.course_id}')">编辑</button>
              <button class="btn btn-warning btn-sm" onclick="archiveCourse('${c.course_id}')">归档</button>
            </td>
          </tr>`).join('')
        }
      </tbody>
    </table>
    <div class="pagination">
      <span>共 ${filtered.length} 条</span>
      <div class="pages">
        <button onclick="listPage=1;renderListing()" ${listPage===1?'disabled':''}>«</button>
        <button onclick="listPage--;renderListing()" ${listPage===1?'disabled':''}>‹</button>
        ${Array.from({length:totalPages},(_,i)=>i+1).filter(p=>p===1||p===totalPages||Math.abs(p-listPage)<3).map((p,i,arr)=>{
          let html = '';
          if(i>0 && arr[i-1]!==p-1) html += '<span style="padding:6px">…</span>';
          html += `<button class="${p===listPage?'active':''}" onclick="listPage=${p};renderListing()">${p}</button>`;
          return html;
        }).join('')}
        <button onclick="listPage++;renderListing()" ${listPage===totalPages?'disabled':''}>›</button>
        <button onclick="listPage=totalPages;renderListing()" ${listPage===totalPages?'disabled':''}>»</button>
      </div>
      <select onchange="listPageSize=parseInt(this.value);listPage=1;renderListing()">
        <option value="10" ${listPageSize===10?'selected':''}>10条/页</option>
        <option value="20" ${listPageSize===20?'selected':''}>20条/页</option>
        <option value="50" ${listPageSize===50?'selected':''}>50条/页</option>
      </select>
    </div>
  </div>`;

  if (archivedCourses.length > 0) {
    html += `
    <div style="margin-top:24px">
      <h3 style="font-size:14px;color:var(--muted);margin-bottom:8px">📦 已归档课程（${archivedCourses.length}）</h3>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>课程名称</th><th>类型</th><th>归档时间</th><th>操作</th></tr></thead>
          <tbody>
            ${archivedCourses.map(c => `
            <tr class="archived">
              <td>${c.course_id}</td><td>${c.title}</td><td>${typeTag(c.type)}</td>
              <td>${c.updated_at}</td>
              <td><button class="btn btn-success btn-sm" onclick="restoreCourse('${c.course_id}')">↩ 恢复</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  }

  document.getElementById('mainContent').innerHTML = html;
}

// ===== Drafts =====
function renderDrafts() {
  let html = `<div class="toolbar"><h2 style="font-size:16px">📝 草稿列表</h2><span class="spacer"></span>
    <button class="btn btn-outline" onclick="showListing()">← 返回课程列表</button></div>
    <div class="table-wrap"><table>
      <thead><tr><th>草稿名称</th><th>类型</th><th>关联课程</th><th>创建时间</th><th>操作</th></tr></thead>
      <tbody>`;

  if (drafts.length === 0) {
    html += `<tr><td colspan="5"><div class="empty-state"><div class="icon">📝</div>暂无草稿</div></td></tr>`;
  } else {
    drafts.forEach((d,i) => {
      const typeLabel = d.draft_type === 'create' ? '新建课程' : `变更 ${d.course_id}`;
      html += `<tr>
        <td><strong>${d.title||'未命名草稿'}</strong></td>
        <td><span class="tag ${d.draft_type==='create'?'tag-draft':'tag-published'}">${typeLabel}</span></td>
        <td>${d.course_id||'—'}</td>
        <td>${d.created_at}</td>
        <td>
          <button class="btn btn-outline btn-sm" onclick="continueDraft(${i})">继续编辑</button>
          <button class="btn btn-danger btn-sm" onclick="deleteDraft(${i})">删除</button>
        </td>
      </tr>`;
    });
  }

  html += '</tbody></table></div>';
  document.getElementById('mainContent').innerHTML = html;
}

// ===== Create / Edit Form =====
let editTargetId = null;
let editDraftIndex = null;
let formData = {};

function openCreate() {
  currentView = 'create';
  editTargetId = null;
  editDraftIndex = null;
  formData = {
    title:'', description:'', cover:null, type:'online', tags:'', trainer_ids:[],
    schedule:[{date:'',time:''}], price_original:'', status:'draft'
  };
  render();
}

function openEdit(courseId) {
  currentView = 'edit';
  editTargetId = courseId;
  const course = courses.find(c => c.course_id === courseId);
  if (!course) return;
  formData = JSON.parse(JSON.stringify(course));
  editDraftIndex = null;
  render();
}

function continueDraft(idx) {
  const d = drafts[idx];
  if (d.draft_type === 'create') {
    currentView = 'create';
    editTargetId = null;
  } else {
    currentView = 'edit';
    editTargetId = d.course_id;
  }
  editDraftIndex = idx;
  formData = JSON.parse(JSON.stringify(d.data));
  render();
}

function deleteDraft(idx) {
  if (!confirm('确定删除这个草稿吗？')) return;
  drafts.splice(idx, 1);
  save('edu_drafts', drafts);
  toast('草稿已删除', 'success');
  render();
}

function renderForm(title, showVersion) {
  const v = formData;
  const isEdit = currentView === 'edit';
  return `
  <div class="toolbar">
    <h2 style="font-size:16px">${title}</h2>
    ${isEdit && showVersion ? `<span class="tag tag-published">v${(v.version||1)+(editDraftIndex===null?1:0)} ${editDraftIndex===null?'(变更草稿)':'(草稿)'}</span>` : ''}
    <span class="spacer"></span>
    <button class="btn btn-outline" onclick="cancelForm()">← 返回</button>
  </div>

  <div class="form-card">
    <h3 style="margin-bottom:16px">📖 课程基础信息</h3>
    <div class="form-row">
      <div class="form-group">
        <label><span class="required">*</span> 课程名称</label>
        <input type="text" id="fTitle" value="${v.title||''}" placeholder="输入课程名称">
        <div class="err-msg">课程名称为必填项</div>
      </div>
      <div class="form-group">
        <label><span class="required">*</span> 上课方式</label>
        <select id="fType"><option value="online" ${v.type==='online'?'selected':''}>在线</option>
          <option value="offline" ${v.type==='offline'?'selected':''}>线下</option>
          <option value="hybrid" ${v.type==='hybrid'?'selected':''}>混合</option></select>
      </div>
    </div>
    <div class="form-group">
      <label>课程描述</label>
      <textarea id="fDesc" placeholder="输入课程描述...">${v.description||''}</textarea>
    </div>
    <div class="form-group">
      <label>封面图片</label>
      <div class="cover-preview" id="coverPreview">
        ${v.cover ? `<img src="${v.cover}" alt="cover">` : `<div class="placeholder">默认封面（点击上传）</div>`}
      </div>
      <input type="file" accept="image/*" onchange="uploadCover(this)" style="font-size:12px">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label><span class="required">*</span> 原价 (¥)</label>
        <input type="number" id="fPrice" value="${v.price_original||''}" placeholder="3000" min="0" step="100">
        <div class="err-msg">价格为必填项，且必须大于 0</div>
      </div>
      <div class="form-group">
        <label>标签（逗号分隔）</label>
        <input type="text" id="fTags" value="${(v.tags||[]).join(',')}" placeholder="python, beginner, data">
      </div>
    </div>

    <h3 style="margin:24px 0 16px">📅 课程排期</h3>
    <ul class="schedule-list" id="scheduleList">
      ${(v.schedule||[]).map((s,i) => renderScheduleItem(s,i)).join('')}
    </ul>
    <button class="btn btn-outline btn-sm" onclick="addSchedule()" style="margin-top:8px">+ 添加排期</button>

    <h3 style="margin:24px 0 16px">👨‍🏫 关联老师</h3>
    <div class="teacher-select">
      <select id="fTeacherSelect">
        <option value="">选择老师...</option>
        ${teachers.map(t => `<option value="${t.id}" ${(v.trainer_ids||[]).includes(t.id)?'disabled':''}>${t.name} — ${t.subject}</option>`).join('')}
      </select>
      <button class="btn btn-outline btn-sm" onclick="addTeacher()">添加</button>
    </div>
    <div class="selected-teacher" id="selectedTeachers">
      ${(v.trainer_ids||[]).map(id => {
        const t = teachers.find(x=>x.id===id);
        return t ? `<span class="teacher-tag">${t.name} <span class="remove-teacher" onclick="removeTeacher('${id}')">✕</span></span>` : '';
      }).join('')}
    </div>
    ${(v.trainer_ids||[]).length===0 ? '<div style="font-size:12px;color:var(--muted);margin-top:4px">⚠ 请至少关联一位老师</div>' : ''}
    <div class="err-msg" id="teacherErr" style="display:none">请至少关联一位老师</div>

    <div class="form-actions">
      <button class="btn btn-outline" onclick="saveDraft()">💾 Save as Draft</button>
      <button class="btn btn-warning" onclick="cancelForm()">✕ Cancel</button>
      <button class="btn btn-success" onclick="saveAndPublish()">✅ Save & Publish</button>
    </div>
  </div>`;
}

function renderScheduleItem(s, i) {
  const deleted = s._deleted || false;
  return `<li class="schedule-item ${deleted?'deleted':''}">
    <input type="date" value="${s.date||''}" onchange="updateSchedule(${i},'date',this.value)" ${deleted?'disabled':''}>
    <input type="text" value="${s.time||''}" placeholder="09:00-12:00" onchange="updateSchedule(${i},'time',this.value)" ${deleted?'disabled':''}>
    ${deleted ? '<span class="deleted-tag">待删除</span>' : `<button class="btn btn-danger btn-sm" onclick="deleteSchedule(${i})">删除</button>`}
  </li>`;
}

function renderCreateForm() { document.getElementById('mainContent').innerHTML = renderForm('➕ 创建新课程', false); }
function renderEditForm() {
  const c = courses.find(x=>x.course_id===editTargetId);
  document.getElementById('mainContent').innerHTML = renderForm(`✏️ 编辑课程 ${editTargetId}`, true) +
  `<div class="form-card" style="margin-top:16px">
    <h3>📜 版本历史</h3>
    <div>当前版本：<strong>v${(c?.version||1)}</strong></div>
    <div style="font-size:12px;color:var(--muted);margin-top:4px">（版本回滚暂未开放）</div>
  </div>`;
}

// ===== Form Actions =====
function uploadCover(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    formData.cover = reader.result;
    const preview = document.getElementById('coverPreview');
    if (preview) preview.innerHTML = `<img src="${reader.result}" alt="cover">`;
  };
  reader.readAsDataURL(file);
}

function addSchedule() {
  collectForm();  // 先同步用户已填内容，避免 render 重建时丢失
  (formData.schedule = formData.schedule || []).push({date:'',time:''});
  render();
}

function updateSchedule(i, field, value) {
  if (formData.schedule[i]) formData.schedule[i][field] = value;
}

function deleteSchedule(i) {
  collectForm();  // 先同步用户已填内容
  const s = formData.schedule[i];
  const isNew = !editTargetId || (courses.find(c=>c.course_id===editTargetId)?.status==='draft');
  if (isNew) {
    formData.schedule.splice(i,1);
    toast('排期已删除', 'success');
  } else {
    const hasEnrollment = Math.random() > 0.5;
    const hasAttended = hasEnrollment && Math.random() > 0.5;
    if (hasAttended) {
      toast('⚠ 该排期已有人上课，不允许删除', 'error');
      return;
    }
    if (hasEnrollment) {
      if (confirm('该排期已有学员报名但未上课。删除后将自动退费并更新订单。确认删除？')) {
        formData.schedule[i]._deleted = true;
        toast('排期已标记为删除（软删），系统将自动退费', 'success');
        render();
      }
    } else {
      formData.schedule.splice(i,1);
      toast('排期已删除', 'success');
    }
  }
  if (!formData.schedule[i]?._deleted) render();
}

function addTeacher() {
  const sel = document.getElementById('fTeacherSelect');
  if (!sel.value) return;
  collectForm();  // 先同步用户已填内容，避免 render 重建时丢失
  (formData.trainer_ids = formData.trainer_ids || []).push(sel.value);
  render();
}

function removeTeacher(id) {
  const existing = formData.trainer_ids || [];
  if (existing.length <= 1) {
    toast('⚠ 必须至少保留一位老师。如需更换，请先添加新老师再移除旧老师', 'error');
    return;
  }
  collectForm();  // 先同步用户已填内容，避免 render 重建时丢失
  formData.trainer_ids = existing.filter(x => x !== id);
  render();
}

function collectForm() {
  formData.title = document.getElementById('fTitle')?.value || '';
  formData.type = document.getElementById('fType')?.value || 'online';
  formData.description = document.getElementById('fDesc')?.value || '';
  formData.price_original = parseFloat(document.getElementById('fPrice')?.value) || 0;
  formData.tags = (document.getElementById('fTags')?.value || '').split(',').map(t=>t.trim()).filter(Boolean);
}

function validateForm() {
  collectForm();
  let valid = true;
  const fields = [
    {id:'fTitle', v:formData.title, msg:'课程名称为必填项'},
    {id:'fPrice', v:formData.price_original > 0, msg:'价格必须大于 0'},
  ];

  fields.forEach(f => {
    const el = document.getElementById(f.id);
    if (el) {
      if (!f.v) { el.classList.add('error'); valid = false; }
      else el.classList.remove('error');
    }
  });

  if (!formData.trainer_ids || formData.trainer_ids.length === 0) {
    valid = false;
    const err = document.getElementById('teacherErr');
    if (err) err.style.display = 'block';
  } else {
    const err = document.getElementById('teacherErr');
    if (err) err.style.display = 'none';
  }

  if (!valid) toast('请完善必填项后再发布', 'error');
  return valid;
}

function saveDraft() {
  collectForm();
  const draftObj = {
    draft_type: editTargetId ? 'edit' : 'create',
    course_id: editTargetId || null,
    title: formData.title || '未命名课程',
    data: JSON.parse(JSON.stringify(formData)),
    created_at: now()
  };

  if (editDraftIndex !== null && editDraftIndex !== undefined) {
    drafts[editDraftIndex] = draftObj;
  } else {
    drafts.push(draftObj);
  }
  save('edu_drafts', drafts);
  toast('💾 草稿已保存', 'success');
  showDrafts();
}

function saveAndPublish() {
  if (!validateForm()) return;

  collectForm();
  formData.status = 'published';
  formData.updated_at = now();

  if (editTargetId) {
    const idx = courses.findIndex(c => c.course_id === editTargetId);
    if (idx >= 0) {
      formData.version = (courses[idx].version || 1) + 1;
      formData.created_at = courses[idx].created_at;
      courses[idx] = { ...courses[idx], ...formData };
    }
    // 清除关联草稿
    if (editDraftIndex !== null && editDraftIndex !== undefined) {
      drafts.splice(editDraftIndex, 1);
      save('edu_drafts', drafts);
    } else {
      // 清除该课程的所有变更草稿
      drafts = drafts.filter(d => !(d.draft_type === 'edit' && d.course_id === editTargetId));
      save('edu_drafts', drafts);
    }
  } else {
    courseIdCounter++;
    formData.course_id = 'C' + String(courseIdCounter).padStart(3,'0');
    formData.version = 1;
    formData.created_at = now();
    courses.push({...formData});
    save('edu_courseCounter', courseIdCounter);
    // 清除创建型草稿
    if (editDraftIndex !== null && editDraftIndex !== undefined) {
      drafts.splice(editDraftIndex, 1);
    } else {
      drafts = drafts.filter(d => d.draft_type !== 'create' || d.title !== formData.title);
    }
    save('edu_drafts', drafts);
  }

  save('edu_courses', courses);
  toast('✅ 课程已发布！', 'success');
  showListing();
}

function cancelForm() {
  if (formData.title && !confirm('确定放弃？未保存的内容将丢失。')) return;
  showListing();
}

// ===== Listing Actions =====
function sortBy(field) {
  if (listSortField === field) listSortDesc = !listSortDesc;
  else { listSortField = field; listSortDesc = true; }
  renderListing();
}

function sortArrow(field) {
  if (listSortField !== field) return '';
  return listSortDesc ? ' ↓' : ' ↑';
}

function toggleAll(cb) {
  const checkboxes = document.querySelectorAll('tbody input[type=checkbox]');
  checkboxes.forEach(c => { c.checked = cb.checked; });
  const pageItems = getPageItems();
  pageItems.forEach(c => {
    if (cb.checked) selectedIds.add(c.course_id);
    else selectedIds.delete(c.course_id);
  });
}

function toggleSelect(id, cb) {
  if (cb.checked) selectedIds.add(id);
  else selectedIds.delete(id);
}

function getPageItems() {
  let filtered = courses.filter(c => !c.archived && c.status !== 'draft');
  if (listSearch) {
    const q = listSearch.toLowerCase();
    filtered = filtered.filter(c => c.title.toLowerCase().includes(q) || (c.description||'').toLowerCase().includes(q));
  }
  if (listFilterStatus) filtered = filtered.filter(c => c.status === listFilterStatus);
  if (listFilterType) filtered = filtered.filter(c => c.type === listFilterType);
  const start = (listPage - 1) * listPageSize;
  return filtered.slice(start, start + listPageSize);
}

function quickPublish(id) {
  const c = courses.find(x => x.course_id === id);
  if (!c) return;
  if (!c.title || !c.price_original || (c.trainer_ids||[]).length === 0) {
    toast('⚠ 该课程必填项不完整，请进入编辑页面完善后再发布', 'error');
    return;
  }
  c.status = 'published';
  c.updated_at = now();
  save('edu_courses', courses);
  toast('📢 课程已发布！', 'success');
  renderListing();
}

function archiveCourse(id) {
  if (!confirm('确定归档该课程吗？已报名的学员订单不受影响。')) return;
  const c = courses.find(x => x.course_id === id);
  if (!c) return;
  c.archived = true;
  c.updated_at = now();
  save('edu_courses', courses);
  toast('📦 课程已归档', 'success');
  renderListing();
}

function restoreCourse(id) {
  const c = courses.find(x => x.course_id === id);
  if (!c) return;
  c.archived = false;
  c.updated_at = now();
  save('edu_courses', courses);
  toast('↩ 课程已恢复', 'success');
  renderListing();
}

function batchPublish() {
  selectedIds.forEach(id => {
    const c = courses.find(x => x.course_id === id);
    if (c && c.status === 'draft' && c.title && c.price_original > 0 && (c.trainer_ids||[]).length > 0) {
      c.status = 'published';
      c.updated_at = now();
    }
  });
  save('edu_courses', courses);
  selectedIds.clear();
  toast('📢 已批量发布符合条件的课程', 'success');
  renderListing();
}

function batchArchive() {
  if (!confirm(`确定归档选中的 ${selectedIds.size} 门课程吗？`)) return;
  selectedIds.forEach(id => {
    const c = courses.find(x => x.course_id === id);
    if (c) { c.archived = true; c.updated_at = now(); }
  });
  save('edu_courses', courses);
  selectedIds.clear();
  toast('📦 已批量归档', 'success');
  renderListing();
}

// ===== Init =====
render();
</script>
</body>
</html>
