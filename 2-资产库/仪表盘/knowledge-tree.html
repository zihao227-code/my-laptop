<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识树 · 学习笔记</title>
<style>
:root {
  --bg:#FBFAF7; --sidebar:#F5F2EB; --card:#FFF; --border:#E8E4DF; --hairline:#F0EDE8;
  --text:#1E1E1E; --muted:#6B6B6B; --faint:#9CA3AF; --link:#2563EB;
  --tag-bg:#EDE9E2; --green:#4CAF92; --amber:#E5A853; --purple:#8B7EC8; --blue:#5B8DEF;
  --radius:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}

/* ===== SIDEBAR ===== */
.sidebar{width:300px;min-width:300px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh}
.sidebar-head{padding:18px 20px 10px;border-bottom:1px solid var(--hairline)}
.sidebar-head h2{font-size:15px;font-weight:700}
.sidebar-actions{padding:8px 16px;display:flex;gap:6px;border-bottom:1px solid var(--hairline)}
.sidebar-actions button{flex:1;padding:5px 0;font-size:10px}
.sidebar-tree{flex:1;overflow-y:auto;padding:6px 0}

.tree-node{padding:0;user-select:none}
.tree-row{display:flex;align-items:center;gap:4px;padding:6px 12px 6px 0;cursor:pointer;transition:background .1s;border-left:3px solid transparent}
.tree-row:hover{background:rgba(0,0,0,.03)}
.tree-row.active{background:rgba(37,99,235,.06);border-left-color:var(--link);font-weight:600}
.tree-toggle{width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:7px;color:var(--faint);flex-shrink:0;transition:transform .15s}
.tree-toggle.collapsed{transform:rotate(-90deg)}
.tree-toggle.leaf{visibility:hidden}
.tree-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.tree-label{font-size:12px;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.tree-children{overflow:hidden;transition:max-height .25s;max-height:2000px}
.tree-children.collapsed{max-height:0}
.tree-meta{font-size:9px;color:var(--faint);margin-left:auto;flex-shrink:0}

.sidebar-foot{padding:8px 16px;border-top:1px solid var(--hairline);display:flex;gap:6px}
.sidebar-foot button{flex:1;padding:4px 0;font-size:9px}

/* ===== MAIN (document style) ===== */
.main{flex:1;height:100vh;overflow-y:auto}
.main-inner{max-width:720px;margin:0 auto;padding:48px 48px 80px}

/* Article title */
.doc-title{font-family:'Noto Serif SC','Source Serif 4','Georgia','Songti SC',serif;font-size:28px;font-weight:700;line-height:1.4;margin-bottom:8px;color:var(--text)}
.doc-title.editing{border-bottom:2px dashed var(--faint);outline:none;padding-bottom:2px}
.doc-meta{font-size:12px;color:var(--faint);margin-bottom:32px;display:flex;align-items:center;gap:10px}
.doc-meta .tag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--tag-bg);color:var(--muted);font-weight:600}

/* Article body */
.doc-body{font-size:16px;line-height:1.95;color:var(--text)}
.doc-body p{margin-bottom:1.2em}
.doc-body p:last-child{margin-bottom:0}
.doc-body .ba-note{color:var(--muted);font-size:15px;font-style:italic;padding:0 0 0 12px;border-left:2px solid var(--amber);margin:1.5em 0}
.doc-body strong{color:#1a1a1a}
.doc-body table{width:100%;border-collapse:collapse;margin:1.2em 0;font-size:14px}
.doc-body th,.doc-body td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--hairline)}
.doc-body th{color:var(--muted);font-weight:600;font-size:12px}
.doc-body ul,.doc-body ol{margin:0.6em 0;padding-left:1.5em}
.doc-body li{margin-bottom:0.3em}
/* Emoji list items */
.doc-body p.list-item{padding-left:0;margin-bottom:0.5em}

/* Edit mode */
.doc-body.edit p{outline:none;min-height:1.5em;border-bottom:1px dashed transparent}
.doc-body.edit p:hover{border-bottom-color:var(--hairline)}
.doc-body.edit p:focus{border-bottom-color:var(--link);background:rgba(37,99,235,.02)}

/* Children */
.children-section{margin-top:48px;padding-top:24px;border-top:1px solid var(--hairline)}
.children-section h3{font-size:14px;color:var(--muted);margin-bottom:12px;font-weight:600}
.child-card{display:flex;align-items:center;gap:10px;padding:10px 14px;margin-bottom:6px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;font-size:14px;transition:.1s}
.child-card:hover{border-color:var(--link);background:rgba(37,99,235,.02)}
.child-card .c-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--link)}
.child-card .c-title{flex:1}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:32px}
.toolbar button{padding:5px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:11px;cursor:pointer;background:var(--card);color:var(--text);font-weight:600;transition:.15s}
.toolbar button:hover{background:var(--sidebar)}.toolbar button.active{background:var(--link);color:#fff;border-color:var(--link)}
.toolbar button.danger{color:#E05555}

/* Empty */
.empty{padding:80px 40px;text-align:center;color:var(--faint)}
.empty .icon{font-size:48px;margin-bottom:12px}
.empty h3{font-size:18px;color:var(--muted);margin-bottom:8px}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:var(--radius);color:#fff;font-size:12px;font-weight:600;z-index:100;background:var(--text);animation:slideIn .3s}
@keyframes slideIn{from{transform:translateY(15px);opacity:0}to{transform:translateY(0);opacity:1}}

@media(max-width:900px){.sidebar{display:none}.main-inner{padding:24px 20px 60px}}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-head"><h2>知识树</h2></div>
  <div class="sidebar-actions">
    <button class="btn" onclick="addChild()" style="background:var(--link);color:#fff;border-color:var(--link)">＋ 子节点</button>
    <button class="btn" onclick="addSibling()">＋ 同级</button>
    <button class="btn" onclick="addRootNode()">🌳 新树</button>
    <button class="btn" onclick="exportTree()">📥</button>
  </div>
  <div class="sidebar-tree" id="sidebarTree"></div>
  <div class="sidebar-foot">
    <button class="btn" onclick="autoExpand()">⊞ 展开</button>
    <button class="btn" onclick="autoCollapse()">⊟ 折叠</button>
    <button class="btn danger" onclick="deleteNode()">🗑</button>
  </div>
</div>

<div class="main" id="mainScroll">
  <div class="main-inner" id="mainInner">
    <div class="empty">
      <div class="icon">🌳</div>
      <h3>选择左侧节点开始</h3>
      <p>或点击「🌳 新树」创建知识树</p>
    </div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<script>
// ===== DATA =====
const STORAGE_KEY = 'knowledge_tree_v2';

const DEFAULT_ROOTS = [{
  id: 'root', title: 'AI 产品经理学习笔记', icon: '', expanded: true,
  tags: ['目录'],
  content: `这是一份从零开始的学习笔记。如果你是一个刚接触 AI 的 BA 或产品经理，从这里开始，按顺序往下读。每一节都假设你只具备基本的 BA/PM 工作经验，不需要任何 AI 技术背景。\n\n阅读顺序：先搞懂 AI 是什么 → 学会怎么跟 AI 沟通 → 理解 PRD 怎么写 → 掌握 AI 产品的 PRD 框架 → 了解 Agent 怎么协作 → 学会怎么测试 → 最后看看产品设计方法论。`,
  children: [
    // ===== PART 1: AI 基础概念 =====
    { id: 'p1', title: 'Part 1 · AI 基础概念', expanded: true, tags: ['AI', '基础'],
      content: `在学怎么用 AI 做产品之前，你至少需要知道 AI 到底是什么、能做什么、不能做什么。这一部分不讲技术细节，只讲你最需要知道的几个核心概念。读完这些，你就能理解后面所有的内容了。`,
      children: [
        { id: 'p1-1', title: 'LLM（大语言模型）是什么', expanded: false, tags: ['LLM'],
          content: `LLM 说白了就是一个超级强大的"下一词预测器"。它读了几乎整个互联网的文本，学会了预测"给定前面的话，下一个词最可能是什么"。因为读得足够多，这种预测能力涌现出了理解和推理的效果。\n\n三个你必须要知道的概念：\n\nToken — AI 的最小文字单位。1 个 Token ≈ 0.5 个中文字。模型的收费、上下文长度都以 Token 计算。你的 Prompt 越长，花的 Token 越多。\n\nContext Window — AI 的"短期记忆"。一次对话中 AI 能记住多少内容。超出窗口的部分会被遗忘。Claude 目前支持 200K tokens，大约一本小说的长度。\n\nTemperature（0~1） — 控制 AI 输出的"创造力"。0~0.3 最严谨（适合事实性任务）；0.5~0.7 平衡（适合文档起草）；0.8~1.0 最发散（适合头脑风暴）。\n\nBA 类比：把 LLM 想象成一个读过公司所有文档的超级新人——他能回答大部分问题，但偶尔也会胡说八道。`,
          children: [
            { id: 'p1-1a', title: 'Token 计价参考', expanded: false, tags: ['数据'],
              content: `不同模型的 Token 价格差异很大：\n\n小模型（Haiku/Flash）：输入 $0.25/百万Token，输出 $1.25\n中模型（Sonnet/V4）：输入 $3/百万Token，输出 $15\n大模型（Opus/GPT-5）：输入 $15/百万Token，输出 $75\n\n一个典型的 BA 需求文档大约 3000-5000 Token。用中模型分析一次，成本不到一角钱。用大模型则要几毛到一块。这就是为什么"能用小模型绝不用大模型"——成本差 10 倍以上。` },
            { id: 'p1-1b', title: 'Temperature 选值指南', expanded: false, tags: ['参数'],
              content: `0.0~0.3：验收标准生成、数据提取、事实性问答。输出稳定可复现，几乎不会有变化。\n0.5~0.7：文档起草、需求分析、用户故事编写。有一点灵活性但不会跑偏。\n0.8~1.0：头脑风暴、边缘场景梳理、创意方案。输出每次都不一样，适合探索。\n\n实战建议：日常 BA 工作默认用 0.3~0.5。需要创意时临时调到 0.8。` }
          ]
        },
        { id: 'p1-2', title: 'AI 的能力边界', expanded: false, tags: ['概念'],
          content: `AI 不是万能的，但不知道它的边界在哪，才是最危险的。\n\nAI 擅长：文本生成与改写、结构化信息提取（会议记录→待办清单）、代码生成与辅助、分析与推理、创意和头脑风暴。\n\nAI 不擅长：会幻觉（一本正经胡说八道）、缺乏真正的理解和意图、不能执行真实世界操作、上下文超出窗口会遗忘、同一 Prompt 两次输出可能不同。\n\n一个实用的思维模型——做每个任务前问自己：这个任务的输出我能验证对错吗？不能验证的，不能完全交给 AI。能验证的，放心让 AI 做初稿，你来审。\n\nBA 的不可替代性：你有客户现场的经历、有对公司战略的理解、有和开发团队磨合的经验——这些 AI 永远不会有。`,
          children: [
            { id: 'p1-2a', title: '三个问题思维模型', expanded: false, tags: ['方法'],
              content: `每次用 AI 之前问自己三个问题：\n\n1. 这个任务需要我独有的哪些业务知识？→ 把这些写进 Prompt\n2. 这个任务的输出我能验证对错吗？→ 不能验证的，不能完全交给 AI\n3. AI 的输出要"用"在哪里？→ 对外展示的要人工审核，内部草稿可以宽松\n\n养成习惯后，你会发现自己对 AI 的信任度和使用效率都大幅提升。` }
          ]
        },
        { id: 'p1-3', title: 'RAG（检索增强生成）', expanded: false, tags: ['RAG'],
          content: `RAG 就是"先查资料，再回答问题"。让 AI 在回答之前，先从一个知识库里检索相关内容，然后基于检索结果来回答。\n\n打个比方：普通 LLM 是闭卷考试——全靠记忆。RAG 是开卷考试——给你参考资料，你先查再答。\n\nRAG 解决的核心问题：AI 的知识截止日期（训练数据是旧的）、幻觉（没有参考资料容易瞎编）、私有知识（公司内部文档 AI 没读过）。\n\n实际应用：把你公司的历史需求文档、PRD、设计规范全部导入知识库，然后问 AI"这个需求跟我们之前的哪个功能类似？"AI 会先检索所有文档，找到相关内容，再基于那些内容回答你。\n\nBA 视角：RAG 就像给 AI 配了一个"文档管理员"——每次 AI 回答问题，管理员先去找相关文件，AI 基于文件内容作答。`,
          children: [
            { id: 'p1-3a', title: 'RAG 适用场景', expanded: false, tags: ['参考'],
              content: `✅ 适合：企业内部知识问答、客服系统、文档分析、合规审查——任何需要"基于特定材料回答"的场景。\n❌ 不适合：纯创意写作、开放式头脑风暴——这些不需要参考资料，反而会被限制。\n\n如果你的 AI 产品需要引用"公司已有的文档/数据"，用 RAG。如果只是让 AI 基于通用知识创作，不需要 RAG。` }
          ]
        },
        { id: 'p1-4', title: 'Agent（智能体）', expanded: false, tags: ['Agent'],
          content: `Agent 就是一个能自主使用工具的 AI。普通 AI 只能"说话"——你问它答。Agent 能"做事"——它能自己决定什么时候调用什么工具来完成你的任务。\n\nAgent 的工作循环：思考 → 行动 → 观察结果 → 再思考 → 再行动，直到任务完成。就像一个实习生——你交代一个任务，他自己拆解步骤、去找资料、去查数据、去做计算，最后给你一个完整的结果。\n\n你已经在用的就是 Agent：Claude Code 能自己读文件、搜索代码、执行命令、写代码——这些都是 Agent 行为。你项目里的 6 个 Agent 也属于 Agent——每个都有独立职责，能自主调用工具完成任务。\n\nBA 类比：Agent 就像一个被分配了任务的实习生——你告诉他目标和约束，他自己想办法执行。`,
          children: [
            { id: 'p1-4a', title: 'Agent vs 普通 LLM', expanded: false, tags: ['对比'],
              content: `普通 LLM：你问 → 它答。一次交互。\nAgent：你给目标 → 它规划步骤 → 调用工具 → 检查结果 → 调整 → 交付。多次交互循环。\n\n关键区别：Agent 有"工具调用"能力和"自主决策"能力。它能自己判断"现在该干什么"，而不是等你的下一条指令。\n\n你的项目实际例子：你说"检查一下有没有 Bug"→ 测试大师找 Bug → 探索者诊断根因 → 审视者审查方案 → 执行者修复。整个链路不需要你每一步都发指令——Agent 之间自己协作。` }
          ]
        },
        { id: 'p1-5', title: 'MCP（模型上下文协议）', expanded: false, tags: ['MCP'],
          content: `MCP 就是 AI 的"USB 接口标准"。\n\n以前 AI 要连接外部系统（GitHub、Jira、数据库），每个系统都要单独开发一套对接方式——就像你家里每个电器都有自己独特的充电线。MCP 把这个统一了——只要系统提供了 MCP 接口，AI 用一种方式就能连上。\n\n就像 USB 出来之前，你电脑上全是各种形状的接口。USB 统一了这一切。MCP 在 AI 领域做的是同一件事。\n\n你已经在用了：Claude Code 的 Playwright 浏览器操控、飞书的 MCP 插件——这些都是通过 MCP 协议连接的。\n\nBA 视角：MCP 就像公司内部统一定义的 API 接口规范——所有系统都用同一套标准对接。` }
      ]
    },
    // ===== PART 2: Prompt Engineering =====
    { id: 'p2', title: 'Part 2 · Prompt Engineering', expanded: false, tags: ['Prompt'],
      content: `搞懂了 AI 是什么之后，下一步就是学会怎么跟它沟通。Prompt Engineering 听起来很技术，但其实跟你写用户故事是一回事——都是把需求清楚、结构化地传达出去。`,
      children: [
        { id: 'p2-1', title: 'Prompt 核心公式', expanded: false, tags: ['Prompt', 'BA方法'],
          content: `好 Prompt = 角色 + 任务 + 格式 + 约束。\n\n跟 BA 写用户故事完全一个道理——"作为...我想要...以便..."。这不是巧合，是因为结构化输入能最大程度减少 LLM 的歧义。\n\n角色：设定 AI 的身份和视角。"你是一个资深 BA"和"你是一个前端开发"会给同一个任务完全不同的输出。\n任务：具体要做什么。越具体越好。不是"帮我分析需求"，而是"帮我从这份需求文档中提取所有功能点，按优先级排序"。\n格式：输出什么结构。JSON？Markdown 表格？列表？明确告诉 AI 你要的格式，减少后处理成本。\n约束：字数限制、禁止内容、标注要求。相当于用户故事的验收标准。\n\nBA 的天然优势：你每天都在写验收标准——这就是 Prompt 约束。你每天都在拆解需求——这就是 Prompt 任务。你的技能完全可迁移。` },
        { id: 'p2-2', title: 'Prompt 模板库（BA 专用）', expanded: false, tags: ['模板'],
          content: `需求分析 Prompt：\n"你是一个资深 BA。分析以下需求文档，输出：1）所有功能点列表(按P0/P1/P2分级) 2）缺失或未说清楚的地方 3）需要与后端联调的接口清单。用 Markdown 表格输出。"\n\n用户故事生成 Prompt：\n"你是一个 BA。基于以下功能描述，生成 3 条用户故事。每条包含：角色、功能、价值、验收标准(GIVEN-WHEN-THEN 格式)。"\n\n流程图生成 Prompt：\n"用 Mermaid flowchart 画出以下流程：[步骤1][步骤2][分支判断][结果]。输出完整的 Mermaid 代码块。"` }
      ]
    },
    // ===== PART 3: PRD 基础 =====
    { id: 'p3', title: 'Part 3 · PRD 基础', expanded: false, tags: ['PRD', 'BA方法'],
      content: `在学 AI PRD 之前，你首先得把传统 PRD 讲清楚。因为 AI PRD 并不是一个全新的东西——它是在传统 PRD 的基础上加了 AI 专属的层。这一部分从传统 PRD 的要素开始，再到两种 PRD 的对比。`,
      children: [
        { id: 'p3-1', title: '传统 PRD 必备要素', expanded: false, tags: ['PRD'],
          content: `每份 PRD 至少包含：\n\n背景与目标 — 为什么要做？解决什么问题？不做会怎样？\n用户故事 — 谁、要什么、为什么。每条带 GIVEN-WHEN-THEN 验收标准。\n功能范围 — 做什么、不做什么。P0/P1/P2 优先级。\n流程设计 — 正常流程、异常流程、边界条件。\n数据模型 — 涉及哪些实体、字段、关系。\n接口定义 — 前后端契约、第三方对接。\n非功能需求 — 性能、安全、权限。\n验收标准 — 上线前必须通过的测试。\n\n这些是你在任何项目中都应该写清楚的东西。AI 项目也不例外——只是需要额外加 AI 专属的维度。` },
        { id: 'p3-2', title: '传统 PRD vs AI PRD', expanded: false, tags: ['PRD', 'AI', '对比'],
          content: `传统 PRD 和 AI PRD 最大的区别：传统 PRD 假设输入确定、输出确定；AI PRD 处理的是输入不确定、输出不确定的场景。\n\n传统 PRD 写的是：用户点这个按钮 → 系统做这个操作 → 显示这个结果。每一步都是确定的。AI PRD 写的是：用户可能说任何话 → 模型可能给出任何回答 → 你的系统要如何处理这些不确定性。\n\nAI PRD 比传统 PRD 多出来的部分，本质上都是在管理不确定性：价值判断层（不确定该不该用 AI）、模型目标层（不确定 AI 好不好）、Prompt 层（不确定 AI 输出什么）、评测层（不确定改了之后好坏）、兜底层（不确定 AI 会不会犯错）。\n\n在传统 PRD 基础上，AI PRD 额外需要：\n\n价值判断 — 为什么必须用 AI？传统方案行不行？有没有数据支撑？\n模型目标 — 除了业务 KPI，还要准确率/召回率/对话轮次。\nWorkflow 设计 — 系统+模型+工具的协同流程，哪步调什么。\n模型选型 — 用什么模型？为什么？降级方案？\nPrompt 规格 — 每个节点用什么 Prompt，版本号，评测标准。\n评测系统 — 评测题构建、评测方法、持续维护方案。\n兜底策略 — 模型失败怎么办、幻觉怎么拦截、人工入口在哪。\n产品承载 — AI 能力怎么变成用户能感知到的价值。` }
      ]
    },
    // ===== PART 4: AI PM PRD 八步法 =====
    { id: 'p4', title: 'Part 4 · AI PM PRD 八步法', expanded: false, tags: ['AI产品', 'PRD', '方法论'],
      content: `这部分是整份笔记的核心——大厂在用的 AI 产品 PRD 框架。注意，这八步不是要你每一项都写得很多，而是确保你的 PRD 没有遗漏关键维度。传统 PRD 解决"做什么"，这八步额外解决"AI 的不确定性怎么管"。`,
      children: [
        { id: 'p4-1', title: '① 价值判断：为什么必须用大模型？', expanded: false, tags: ['决策'],
          content: `很多产品经理接到 AI 需求的第一反应是打开 Figma 画原型。错了。你要做的第一件事不是设计功能，而是回答一个问题：这个场景为什么必须用大模型？\n\n正确的做法是做一轮替代方案排查。先问：传统的 if-else 规则能不能搞定？比如用户选 A 就显示 B，选 C 就显示 D——这种确定性的逻辑根本不需要 AI。再问：传统机器学习算法行不行？图片分类、数值预测这类任务，CNN、RNN 可能比大模型更快更稳。\n\n如果传统方案已经够用，用大模型就是浪费钱。Token 费用是小模型的 5-20 倍，延迟更高，输出还更不可控。\n\n我举一个真实的例子。电商素材生成项目，团队最初写的需求是"用 AI 提升素材生成效率"。听起来没问题对吧？但"提效"什么都没说清楚。后来拆了一遍：卡点是大促期间每天 2000 多张图、设计团队只有 3 个人；卡的是运营团队不是设计师；数据说话——AI 素材点击率比人工低 8%，但速度快 47 倍。结论：日常铺量的用 AI 跑，大促主视觉继续人工做。这才叫做了价值判断。\n\n说到底，这一步就是你做 BA 时最熟悉的事：问题定义。不搞清楚"为谁解决什么问题"，后面全是空中楼阁。AI 项目只多了一个维度：传统方案是不是已经够用了？`,
          children: [
            { id: 'p4-1a', title: '替代方案排查矩阵', expanded: false, tags: ['工具'],
              content: `每次做新功能前，先对着这个表问一遍：这个需求具体落在哪一行？\n\n传统规则 (if-else) → 适用：确定性强、分支有限。不适用：需要理解语义、开放式输入。\n传统 ML (CNN/RNN) → 适用：有标注数据、模式固定。不适用：需要生成新内容、复杂推理。\n大模型 (LLM) → 适用：需要理解、生成、推理。不适用：简单逻辑、高频低延迟。\n\n养成习惯，三个月后这就是你的肌肉记忆。` },
            { id: 'p4-1b', title: '实战案例：电商素材生成拆解', expanded: false, tags: ['案例'],
              content: `一个电商平台需要大量商品素材——banner、详情图、推广图。团队最初写的需求是"用 AI 提升素材生成效率"。\n\n拆解之后发现：大促期间每天需要 2000+ 张素材，设计团队只有 3 个人。卡的不是设计质量，是数量。AI 生成的素材点击率比人工低 8%，但生成速度快了 47 倍。\n\n最终决策很清楚：日常大量的铺量素材用 AI，大促主视觉这种需要品质保障的用人工。两套体系并行，互不干扰。` }
          ]
        },
        { id: 'p4-2', title: '② 目标拆解：双轨制', expanded: false, tags: ['KPI'],
          content: `写 PRD 的时候大多数人只会写业务目标——转化率提升多少、人效提高多少、成本降低多少。这些当然要写，但对 AI 产品来说不够。\n\n你还需要一套模型目标。准确率怎么样？召回率怎么样？Agent 完成任务平均要几轮对话？\n\n为什么必须有两套？因为业务好不等于模型好。你的产品可能因为降价促销转化率上去了，但 AI 本身一塌糊涂——没有模型目标，你根本发现不了。反过来，模型指标漂亮但用户不用——那你的业务目标就设错了。`,
          children: [
            { id: 'p4-2a', title: '模型指标速查', expanded: false, tags: ['参考'],
              content: `准确率 = 模型说"是"的里面，有多少真的"是"。高了说明不乱说，低了说明经常误报。\n召回率 = 所有真的"是"里面，模型找出了多少。高了说明不漏，低了说明经常漏报。\nF1 = 准确率和召回率的调和平均。两个指标打架时用它。\n对话轮次 = Agent 完成一个任务要来回几轮。越少越好，说明模型理解能力强。\n幻觉率 = 模型编造事实的比例。AI 产品独有的指标，必须追踪。` }
          ]
        },
        { id: 'p4-3', title: '③ 需求与流程设计：Workflow 思维', expanded: false, tags: ['流程'],
          content: `AI 产品的流程不是用户点按钮那么简单。它是系统、模型、工具三者协同的结果。\n\n做 Agent 的时候你必须在 PRD 里写清楚三件事：哪一步调用大模型来理解或生成？哪一步调用外部工具？怎么做路由判断？\n\n本质上你是在设计一个 Workflow 系统，不是在设计一个表单页面。这个思维转换很重要——以前你画的是用户操作流程，现在你画的是模型调用流程。`,
          children: [
            { id: 'p4-3a', title: 'Agent Workflow 模板', expanded: false, tags: ['模板'],
              content: `用户输入 → 意图识别 → 路由判断\n  ├── 简单问答 → 直接调大模型 → 生成回复\n  ├── 需要查资料 → 先查知识库(RAG) → 再调大模型 → 生成回复\n  └── 需要实时数据 → 调 API 获取 → 大模型总结 → 输出\n\n每个节点都要标注：调哪个模型？超时多久？失败了怎么降级？\n\n把这些画出来，就是你 AI 功能的"业务流程图"。` }
          ]
        },
        { id: 'p4-4', title: '④ 模型选型：小模型优先', expanded: false, tags: ['成本'],
          content: `新手最常见的错误：一上来就选最强最大的模型。GPT-5、Claude Opus——听起来很厉害对吧？但你的场景可能根本不需要。\n\n能用小模型解决的，绝不用大模型。原因很现实：速度（大模型延迟高，用户体验差）、成本（Token 费用是小模型的 5-20 倍）、稳定性（大模型输出反而更难控制）。\n\n正确的做法：先试最小的模型。不够用再升级。设计一条降级链——小模型失败 → 中模型 → 大模型。你现在用的 DeepSeek-V4-Pro 适合中等复杂度的任务，学习项目完全够用。` },
        { id: 'p4-5', title: '⑤ Prompt 工程：核心交付物 ★', expanded: false, tags: ['Prompt', '工程化'],
          content: `Prompt 不是随便调调参数的事——它是核心交付物，必须写进 PRD。\n\n三件事缺一不可：第一，标注每个环节用了什么 Prompt，具体内容是什么，不是什么"写一段让 AI 分析的话"这种模糊描述。第二，Prompt 要像代码一样做版本管理——V1.0 长什么样、V1.1 改了什么、为什么改。第三，每次改动 Prompt 必须跑评测。没有评测就上线等于闭着眼睛开飞机。\n\n这条红线不能碰。这叫工程化，不是拍脑袋。\n\n你做 BA 的时候，需求文档要版本管理、要评审吧？Prompt 同理。把 Prompt 当成给 AI 的需求文档来管，你已经领先 90% 的人了。` },
        { id: 'p4-6', title: '⑥ 评测系统：产品的生命线', expanded: false, tags: ['评测'],
          content: `判断一个 AI 产品团队专不专业，不用看别的，就看他们的评测系统。\n\nPRD 里必须写清楚：评测题怎么构建？从哪里来？评测标准是什么？怎么打分？怎么跑——自动化还是人工抽检？评测集怎么持续维护？\n\nAI 产品的迭代不是拍脑袋，是评测驱动的。你改了 Prompt，是变好了还是变差了？没有评测数据，你永远不知道答案。\n\n这跟你已经有的测试大师 Agent 做的事完全一样——构建测试用例、定义通过标准、自动化执行、分析结果。你只需要把这个思维从"测代码"迁移到"测 Prompt"。` },
        { id: 'p4-7', title: '⑦ 稳定性兜底：安全网', expanded: false, tags: ['容错'],
          content: `AI 一定会胡说八道。这不是概率问题，是必然事件。\n\n所以你的 PRD 里必须有四道防线：敏感词和异常输入要能自动拦截。模型不会的时候要说官方标准话术，不能自己瞎编。重要的输出可以让另一个模型做交叉校验。紧急情况下要能一键转人工。\n\n终极目标：不让错误直接暴露给用户。这跟你做系统异常流程完全一回事——"支付失败了怎么办""用户没登录怎么办"，AI 只多了一个场景："模型胡说八道了怎么办"。` },
        { id: 'p4-8', title: '⑧ 产品能力设计：价值的载体', expanded: false, tags: ['UX', '产品'],
          content: `很多人到这步直接忽略。但 AI 再强，也必须有一个产品壳来承载它。\n\n三个问题要想清楚：用什么交互形态？对话框、嵌入工作台、还是后台自动化？怎么让用户更容易用？简化输入、一键生成、允许修正 AI 的输出。最关键的是——怎么把 AI 的黑盒能力变成用户能感知到的价值？让用户看到思考过程、展示生成依据、允许二次编辑。\n\n这一步才是产品经理真正的主场。前面七步是工程能力，这一步是产品能力。\n\n你在教育平台上已经做了很多——工作台是决策起点而不是数据展示、学习进度条让用户感知"学到哪了"、Funding 价格明细让人看到"为什么是这个价格"。这些都是把能力变成可感知价值的实例。` },
        { id: 'p4-9', title: '🔑 自我提问清单', expanded: false, tags: ['自查'],
          content: `学完这套框架用这些问题检查自己：\n\n我能拿出数据说服老板"必须用 AI"吗？\n我能区分业务目标和模型目标吗？\n我设计功能时想的是画原型还是画 Workflow？\n我有没有跳过小模型直接上大模型？\n我改了 Prompt 之后有评测标准告诉我改得好不好吗？\n我的产品去掉 AI，用户还能感知到核心价值吗？\n我的 Prompt 有版本号吗？\n\n把这些贴在屏幕旁边，每次写 PRD 前过一遍。三个月后这些就是你的肌肉记忆。` }
      ]
    },
    // ===== PART 5: Agent 协作 =====
    { id: 'p5', title: 'Part 5 · Agent 协作实战', expanded: false, tags: ['Agent', '架构'],
      content: `懂了单个 Agent 之后，我们来看多个 Agent 怎么协作。这一部分的内容来自我自己的实战项目——6 个 Agent 组成的工作网络。这不是理论，是真实跑过的架构。`,
      children: [
        { id: 'p5-1', title: 'Agent 协作网络设计', expanded: false, tags: ['Agent', '架构'],
          content: `Agent 网络采用四线并行架构：BA导师(需求/产品)、探索者(诊断/方案)、测试大师(测试/自动化)、执行者(代码/配置)，加上 Agent管家(元管理) 和 审视者(兜底审查)。\n\nBug 修复流水线：测试大师发现 → 探索者诊断根因 → 审视者审查方案 → 执行者修复 → 测试大师回归验证。\n\n核心教训：修复后必须全局盘点。之前修了 3 个 Bug 结果 dashboard 权限白名单遗漏导致路由递归——修 A 引 B。\n\n铁律：发现 Bug → 暂停全部 Agent → 全局盘点 → 跟用户确认 → 再动手修。\n\n模型分配：分析审查用 sonnet（5个），执行用 haiku（1个）。成本和效果平衡。` },
        { id: 'p5-2', title: 'Bug 修复流水线详解', expanded: false, tags: ['流程'],
          content: `完整的 Bug 修复流程：\n\n1. 测试大师：发现 Bug、分类（模块×类型×严重度）、生成报告\n2. 探索者：诊断根因（调用链追踪、对比方案）、给出修复建议\n3. 审视者：审查方案是否在修根因（7 项清单）、评估影响范围\n4. 执行者：精准修改代码、验证闭环\n5. 测试大师：回归测试、更新仪表盘\n\n关键规则：任何 Agent 不得在用户不知情的情况下修改代码。必须先暂停、盘点、跟用户确认。这不只是流程问题——Agent 自治修 Bug 有很高的"修 A 引 B"风险。` }
      ]
    },
    // ===== PART 6: 测试体系 =====
    { id: 'p6', title: 'Part 6 · 测试体系', expanded: false, tags: ['测试'],
      content: `不管你做什么产品，测试都是最后一道防线。AI 产品尤其如此——因为 AI 的不确定性，你的测试必须比传统产品更严密。这一部分的内容来自我们给教育平台搭建的完整测试体系。`,
      children: [
        { id: 'p6-1', title: '三层测试金字塔', expanded: false, tags: ['测试'],
          content: `测试体系分三层：🟠 E2E（完整用户旅程）→ 🟣 集成（模块间数据契约）→ 🔷 组件（单一功能验证）。\n\n越往上越接近用户真实操作，越往下越聚焦单一功能点。每一层都有各自的关注点，三层加在一起才能形成完整覆盖。\n\n目前教育平台 22 个测试用例的覆盖情况：官网浏览 3/3 层 ✅、认证权限 3/3 层 ✅、Funding 引擎 3/3 层 ✅。缺口在交易支付（仅 E2E）、考试系统（仅组件）、备课管理（仅 E2E）。` },
        { id: 'p6-2', title: '测试仪表盘设计', expanded: false, tags: ['可视化'],
          content: `测试仪表盘本身也是产品——总览（通过率圆环）→ 详情（模块分布）→ 筛选（Bug 类型）→ 趋势（历史记录）。\n\n核心设计原则：一眼看到问题在哪、哪个模块最薄弱、Bug 集中在什么类型。\n\n数据来源必须是真实运行结果，不能手写。我们之前发现 latest.json 是手写的模拟数据——这本身就是测试体系的 Bug。` },
        { id: 'p6-3', title: '前端测试标准（强制）', expanded: false, tags: ['规范'],
          content: `每条测试必须验证用户实际看到的内容，不能只检查 JS 逻辑。\n\n有数据状态：具体元素、文案、列表项数。\n无数据状态：空状态提示、引导按钮。\n数据流路径：数据从哪个 Store 实体 → 经过什么过滤 → 渲染到哪个 DOM 节点。\n角色差异：不同角色看到的内容是否不同。\n\n禁止事项：只检查 console.error 就通过。只验证路由跳转不验证 DOM 内容。手写 latest.json 冒充测试结果。\n\n这条规则已经写进了测试大师 Agent 的系统指令里——因为之前多次出现"数据存在但页面空白"的问题，测试只检查了 JS 逻辑没检查 DOM。` }
      ]
    },
    // ===== PART 7: 产品设计 =====
    { id: 'p7', title: 'Part 7 · 产品设计方法论', expanded: false, tags: ['产品', '设计'],
      content: `最后一部分，回到产品设计本身。不管你用不用 AI，产品设计的核心逻辑是不变的——搞清楚你要解决什么问题、怎么让用户感知到价值。`,
      children: [
        { id: 'p7-1', title: 'Dashboard 设计方法论', expanded: false, tags: ['产品', 'BA方法'],
          content: `Dashboard 的本质不是"另一个页面"，而是"决策起点"。\n\n功能页回答"我有什么订单？"，Dashboard 回答"我现在该关注什么？"。\n\n四个设计原则：每一条信息都是功能 Tab 里看不到的聚合判断。信号 = 数据 + 判断 + 优先级。Admin 关心异常，Learner 关心进度，Trainer 关心时间线。不以数据展示为目的，以推动行动为目的。\n\n我们的实际改造：Learner 旧面板只有三个数字（已购/订单/消息），改成学习进度中心后——课程进度条 + 标签推荐 + 考试入口，增量价值立竿见影。\n\n推荐算法先用标签匹配起步，不着急做复杂推荐。Admin 的趋势分析也不着急——先有核心数据再谈趋势。` },
        { id: 'p7-2', title: '变更管理规则', expanded: false, tags: ['流程'],
          content: `每次动代码前先判断变更类型：增量（新文件、新函数）、修改（改已有逻辑）、删除（砍废弃功能）。\n\n增量优先——新代码与老代码解耦，出问题时直接回滚新文件即可。\n\n这条规则来自于实际教训：之前修 Bug 时频繁改动 router.js、auth.js、app.js，导致同一文件被反复覆盖。增量式改动可以隔离风险。` },
        { id: 'p7-3', title: 'Success Metrics 定义', expanded: false, tags: ['度量'],
          content: `每个功能上线后，如何判断它成功了？\n\nDashboard 工作台：日活/应用日活 > 80%、跳转率 > 40%、Learner 7日留存 > 60%。\n课程市场：详情页转化率 > 30%、购课转化率 > 15%、Funding 利用率 > 50%。\n考试系统：完成率 > 90%、首次通过率 > 60%、重考通过率 > 50%。\n消息系统：打开率 > 70%。\nAgent 协作：Bug 修复周期 < 30 分钟、修复引入新 Bug 率 = 0、诊断准确率 > 80%。\n\n注：目前为定义阶段，实际埋点和数据采集后续按需实现。` }
      ]
    }
  ]
}];


let roots = [];
let currentId = null;
let collapseState = {};
let editMode = false;

function load() {
  try {
    roots = JSON.parse(localStorage.getItem(STORAGE_KEY)) || JSON.parse(JSON.stringify(DEFAULT_ROOTS));
    if (!localStorage.getItem(STORAGE_KEY)) save();
  } catch(e) { roots = JSON.parse(JSON.stringify(DEFAULT_ROOTS)); }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(roots)); }

// ===== TREE =====
function findNode(id, list) {
  for (const n of list || roots) { if (n.id === id) return n; if (n.children) { const f = findNode(id, n.children); if (f) return f; } }
  return null;
}
function findParent(id, list, parent) {
  for (const n of list || roots) {
    if (n.id === id) return parent || roots;
    if (n.children) { const f = findParent(id, n.children, n.children); if (f) return f; }
  }
  return null;
}

function renderTree() {
  document.getElementById('sidebarTree').innerHTML = roots.map(r => renderNode(r, 0)).join('');
}
function renderNode(n, depth) {
  const collapsed = collapseState[n.id] !== undefined ? collapseState[n.id] : !n.expanded;
  const hasChildren = n.children && n.children.length > 0;
  let bg; if (depth===0) bg='#1E1E1E'; else if (hasChildren) bg='var(--link)'; else bg='var(--green)';
  return `<div class="tree-node">
    <div class="tree-row${currentId===n.id?' active':''}" style="padding-left:${12+depth*16}px" onclick="selectNode('${n.id}')">
      <span class="tree-toggle${!hasChildren?' leaf':''}${collapsed?' collapsed':''}" onclick="event.stopPropagation();toggleNode('${n.id}')">▼</span>
      <span class="tree-dot" style="background:${bg}"></span>
      <span class="tree-label">${n.icon||''} ${n.title}</span>
      ${hasChildren?`<span class="tree-meta">${n.children.length}</span>`:''}
    </div>
    ${hasChildren?`<div class="tree-children${collapsed?' collapsed':''}">${n.children.map(c=>renderNode(c,depth+1)).join('')}</div>`:''}
  </div>`;
}
function toggleNode(id) { const n = findNode(id); if (n?.children?.length) { collapseState[id] = !collapseState[id]; renderTree(); } }

// ===== SELECT & RENDER =====
function selectNode(id) {
  saveCurrent();
  currentId = id;
  editMode = false;
  const n = findNode(id);
  if (!n) return;
  renderTree();
  renderContent(n);
}

function renderContent(n) {
  const children = n.children || [];
  const content = n.content || '';
  // Convert plain text content to paragraphs
  const paragraphs = content.split('\n\n').filter(p => p.trim());

  let bodyHTML = paragraphs.map(p => {
    p = p.trim();
    // Table detection
    if (p.startsWith('| ') && p.includes('\n|')) {
      const rows = p.split('\n').filter(r => r.trim());
      if (rows.length >= 2) {
        const headers = rows[0].split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
        const thead = `<tr>${headers}</tr>`;
        const tbody = rows.slice(1).map(r => {
          const cells = r.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');
          return `<tr>${cells}</tr>`;
        }).join('');
        return `<table>${thead}${tbody}</table>`;
      }
    }
    // Bold patterns
    p = p.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Emoji-prefixed lines → styled list
    if (/^(✅|❌|📌|💡|⚠️|🔴|🟢|🟡)/.test(p)) {
      return `<p class="list-item">${p}</p>`;
    }
    // Numbered list items → <ol> wrapper (handled per paragraph group)
    return `<p>${p}</p>`;
  }).join('');

  document.getElementById('mainInner').innerHTML = `
    <div class="toolbar">
      <button id="btnEdit" onclick="toggleEdit()">✏️ 编辑</button>
      <button onclick="addChild()">＋ 子节点</button>
      <button onclick="addSibling()">＋ 同级节点</button>
    </div>

    <h1 class="doc-title" id="docTitle">${n.title}</h1>
    <div class="doc-meta">
      ${(n.tags||[]).map(t => `<span class="tag">${t}</span>`).join(' ')}
      <span>${children.length} 个子节点</span>
    </div>

    <div class="doc-body" id="docBody">${bodyHTML || '<p style="color:var(--faint)">暂无内容。点击「✏️ 编辑」开始写。</p>'}</div>

    ${children.length > 0 ? `
    <div class="children-section">
      <h3>📂 相关节点</h3>
      ${children.map(c => {
        const bg = (c.children||[]).length>0 ? 'var(--link)' : 'var(--green)';
        return `<div class="child-card" onclick="selectNode('${c.id}')">
          <span class="c-dot" style="background:${bg}"></span>
          <span class="c-title">${c.icon||''} ${c.title}</span>
          <span style="font-size:12px;color:var(--faint)">→</span>
        </div>`;
      }).join('')}
    </div>` : ''}

    <div style="margin-top:32px;padding-top:16px;border-top:1px solid var(--hairline);font-size:12px;color:var(--faint)">
      💡 点击 <strong>「✏️ 编辑」</strong> 切换到编辑模式，段落直接可改。修改完再点一次保存。
    </div>
  `;
}

// ===== EDIT MODE =====
function toggleEdit() {
  editMode = !editMode;
  const btn = document.getElementById('btnEdit');
  const body = document.getElementById('docBody');
  const title = document.getElementById('docTitle');

  if (editMode) {
    btn.textContent = '💾 保存';
    btn.classList.add('active');
    title.contentEditable = 'true';
    title.classList.add('editing');
    body.contentEditable = 'true';
    body.classList.add('edit');
    title.focus();
  } else {
    btn.textContent = '✏️ 编辑';
    btn.classList.remove('active');
    title.contentEditable = 'false';
    title.classList.remove('editing');
    body.contentEditable = 'false';
    body.classList.remove('edit');
    saveCurrent();
    toast('已保存');
  }
}

function saveCurrent() {
  if (!currentId) return;
  const n = findNode(currentId);
  if (!n) return;
  const title = document.getElementById('docTitle');
  const body = document.getElementById('docBody');
  if (title && editMode) n.title = title.textContent.trim() || n.title;
  if (body && editMode) {
    // Collect paragraphs back into plain text
    const ps = body.querySelectorAll('p');
    const parts = [];
    ps.forEach(p => { const t = p.textContent.trim(); if (t) parts.push(t); });
    // Check for tables
    const tables = body.querySelectorAll('table');
    tables.forEach(t => {
      let md = '';
      const ths = t.querySelectorAll('th');
      if (ths.length) { md += '| ' + [...ths].map(h=>h.textContent.trim()).join(' | ') + ' |\n'; }
      t.querySelectorAll('tbody tr').forEach(tr => {
        md += '| ' + [...tr.querySelectorAll('td')].map(d=>d.textContent.trim()).join(' | ') + ' |';
      });
      if (md) parts.push(md);
    });
    n.content = parts.join('\n\n');
  }
  save();
}

// ===== CRUD =====
function addChild() {
  if (!currentId) return toast('请先选择一个节点');
  saveCurrent();
  const parent = findNode(currentId);
  const id = 'n'+Date.now();
  parent.children = parent.children || [];
  parent.children.push({id,title:'新节点',expanded:true,tags:[],content:'',children:[]});
  collapseState[parent.id] = false;
  save(); selectNode(id);
}
function addSibling() {
  if (!currentId) return toast('请先选择一个节点');
  saveCurrent();
  const parent = findParent(currentId);
  const idx = parent.findIndex(n=>n.id===currentId);
  const id = 'n'+Date.now();
  parent.splice(idx+1,0,{id,title:'新节点',expanded:true,tags:[],content:'',children:[]});
  save(); selectNode(id);
}
function addRootNode() {
  saveCurrent();
  const id = 'r'+Date.now();
  roots.push({id,title:'新知识树',icon:'🌳',expanded:true,tags:[],content:'',children:[]});
  save(); selectNode(id);
}
function deleteNode() {
  if (!currentId || !confirm('删除此节点及其所有子节点？')) return;
  const parent = findParent(currentId);
  const idx = parent.findIndex(n=>n.id===currentId);
  if (idx>=0) parent.splice(idx,1);
  currentId=null; save();
  document.getElementById('mainInner').innerHTML = '<div class="empty"><div class="icon">🌳</div><h3>选择节点或新建</h3></div>';
  renderTree();
}

// ===== UTILITY =====
function autoExpand() { collapseState = {}; renderTree(); }
function autoCollapse() { roots.forEach(r=>{collapseState[r.id]=true;if(r.children)r.children.forEach(c=>collapseState[c.id]=true)}); renderTree(); }
function exportTree() {
  let md = '# 知识树导出\n\n';
  roots.forEach(r=>{md+=nodeToMd(r,0);});
  const blob=new Blob([md],{type:'text/markdown'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='knowledge-tree-'+new Date().toISOString().slice(0,10)+'.md';a.click();
  toast('导出完成');
}
function nodeToMd(n,depth) {
  const p='#'.repeat(Math.min(depth+2,6));
  let md=`${p} ${n.icon||''} ${n.title}\n\n${n.content||''}\n\n`;
  if (n.tags?.length) md+=`标签：${n.tags.join(', ')}\n\n`;
  if (n.children) n.children.forEach(c=>{md+=nodeToMd(c,depth+1);});
  return md;
}
function toast(msg) {
  const t=document.getElementById('toast');t.textContent=msg;t.classList.remove('hidden');
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.add('hidden'),1800);
}

// ===== INIT =====
load();renderTree();
if (roots.length>0 && !currentId) selectNode(roots[0].id);
document.addEventListener('keydown',e=>{
  if (e.ctrlKey&&e.key==='e'){e.preventDefault();toggleEdit();}
  if (e.ctrlKey&&e.key==='n'){e.preventDefault();addChild();}
});
</script>
</body>
