<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📓 AI 学习笔记</title>
<style>
:root {
  --bg-page: #FBFAF7; --bg-sidebar: #F5F2EB; --bg-card: #FFFFFF;
  --text-primary: #1E1E1E; --text-secondary: #6B6B6B; --text-tertiary: #9CA3AF; --text-link: #2563EB;
  --border-default: #E8E4DF; --border-light: #F0EDE8; --border-hairline: #E5E0D9;
  --block-q-bg: #F3F6FC; --block-q-bar: #5B8DEF;
  --block-a-bg: #F1F8F4; --block-a-bar: #4CAF92;
  --block-s-bg: #FEFAF0; --block-s-bar: #E5A853;
  --block-d-bg: #F7F4FC; --block-d-bar: #8B7EC8;
  --block-m-bg: #FAFAF9; --block-m-border: #E0DCD5;
  --nav-hover: #EDE9E2; --nav-active-bg: #E7E2D9; --nav-active-bar: #5B8DEF;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04); --shadow-card: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;background:var(--bg-page);color:var(--text-primary);height:100vh;display:flex;overflow:hidden}

/* ===== LEFT SIDEBAR ===== */
.sidebar{width:280px;min-width:280px;background:var(--bg-sidebar);border-right:1px solid var(--border-default);display:flex;flex-direction:column;height:100vh;transition:margin .25s}
.sidebar.collapsed{margin-left:-280px}
.sidebar-head{padding:20px 20px 12px}
.sidebar-head h2{font-size:16px;font-weight:700}
.sidebar-head .sub{font-size:10px;color:var(--text-tertiary);margin-top:2px}
.sidebar-search{padding:0 16px 10px}
.sidebar-search input{width:100%;padding:8px 12px;border:1px solid var(--border-default);border-radius:var(--radius-sm);background:var(--bg-card);color:var(--text-primary);font-size:12px;outline:none}
.sidebar-search input:focus{border-color:var(--text-link)}
.sidebar-tree{flex:1;overflow-y:auto;padding:4px 0}
.cat-item{padding:8px 20px 4px;font-size:11px;font-weight:700;color:var(--text-tertiary);cursor:pointer;display:flex;align-items:center;gap:4px;user-select:none;letter-spacing:.5px}
.cat-item:hover{color:var(--text-secondary)}
.cat-item .cat-arrow{font-size:8px;transition:transform .2s;display:inline-block}
.cat-item.collapsed .cat-arrow{transform:rotate(-90deg)}
.cat-children{overflow:hidden;transition:max-height .3s;max-height:800px}
.cat-children.collapsed{max-height:0}
.sub-item{padding:6px 20px 6px 32px;font-size:11px;color:var(--text-tertiary);font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.sub-item:hover{color:var(--text-secondary)}
.sub-item .sub-arrow{font-size:7px;transition:transform .2s}
.sub-item.collapsed .sub-arrow{transform:rotate(-90deg)}
.sub-children{overflow:hidden;transition:max-height .3s;max-height:400px}
.sub-children.collapsed{max-height:0}
.note-item{padding:7px 20px 7px 44px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px;border-left:3px solid transparent;transition:.1s;color:var(--text-secondary)}
.note-item:hover{background:var(--nav-hover);color:var(--text-primary)}
.note-item.active{background:var(--nav-active-bg);color:var(--nav-active-text);border-left-color:var(--nav-active-bar);font-weight:600}
.note-item .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sidebar-foot{padding:10px 16px;border-top:1px solid var(--border-hairline);display:flex;gap:6px}
.sidebar-foot button{flex:1;padding:6px 0;font-size:10px}
.sidebar-toggle{position:fixed;left:280px;top:12px;z-index:10;background:var(--bg-card);border:1px solid var(--border-default);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:8px 6px;cursor:pointer;font-size:10px;color:var(--text-tertiary);transition:left .25s}
.sidebar-toggle.shifted{left:0}

/* ===== RIGHT MAIN ===== */
.main{flex:1;height:100vh;overflow-y:auto}
.main-inner{max-width:760px;margin:0 auto;padding:40px 48px 80px}

/* Meta */
.entry-meta{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text-tertiary);margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border-light)}
.entry-meta .sep{color:var(--border-default)}
.breadcrumb{font-size:12px;color:var(--text-tertiary);margin-bottom:8px}
.breadcrumb a{color:var(--text-link);text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}

/* Title */
.entry-title{font-family:'Noto Serif SC','Source Serif 4','Georgia','Songti SC',serif;font-size:28px;font-weight:700;line-height:1.4;margin-bottom:4px;border:none;background:transparent;color:var(--text-primary);width:100%;outline:none}
.entry-title::placeholder{color:var(--text-tertiary)}

/* ===== Content blocks (five colors) ===== */
.block{margin-bottom:20px;padding:20px 24px;border-radius:var(--radius-md);border-left:4px solid transparent;background:var(--bg-card);box-shadow:var(--shadow-sm)}
.block-title{font-size:16px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.block-body{font-size:15px;line-height:1.8;color:var(--text-primary)}
.block-body textarea,.block-body .editable{width:100%;min-height:80px;border:none;background:transparent;color:var(--text-primary);font-size:15px;font-family:inherit;line-height:1.8;resize:vertical;outline:none;padding:0}
.block-body textarea:focus{background:rgba(0,0,0,.02);border-radius:var(--radius-sm);padding:8px}

.block-q{background:var(--block-q-bg);border-left-color:var(--block-q-bar)}
.block-a{background:var(--block-a-bg);border-left-color:var(--block-a-bar)}
.block-s{background:var(--block-s-bg);border-left-color:var(--block-s-bar)}
.block-d{background:var(--block-d-bg);border-left-color:var(--block-d-bar)}
.block-m{background:var(--block-m-bg);border:1px dashed var(--block-m-border);border-left:4px dashed var(--block-m-border)}

/* Mindmap */
.mindmap-tree{font-family:'JetBrains Mono','Fira Code','Consolas',monospace;font-size:13px;line-height:1.9;white-space:pre;padding:8px 0;color:var(--text-primary)}
.mindmap-edit{width:100%;min-height:80px;border:1px solid var(--border-default);border-radius:var(--radius-sm);padding:12px;font-size:12px;font-family:'JetBrains Mono','Fira Code','Consolas',monospace;line-height:1.8;resize:vertical;background:var(--bg-card);color:var(--text-primary);margin-top:8px;outline:none}
.mindmap-edit:focus{border-color:var(--text-link)}

/* Tags */
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.tag{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;background:var(--bg-sidebar);color:var(--text-secondary);border:1px solid var(--border-default)}
.tag:hover{background:var(--nav-hover)}

/* Prev/Next */
.page-nav{display:flex;justify-content:space-between;align-items:center;margin-top:40px;padding-top:20px;border-top:1px solid var(--border-light);font-size:13px}
.page-nav a{color:var(--text-link);text-decoration:none;cursor:pointer}
.page-nav a:hover{text-decoration:underline}
.page-nav .disabled{color:var(--text-tertiary);cursor:default;text-decoration:none}

/* Empty */
.empty{text-align:center;padding:80px 40px;color:var(--text-tertiary)}
.empty .icon{font-size:48px;margin-bottom:12px}
.empty h3{font-size:18px;color:var(--text-secondary);margin-bottom:8px}
.empty p{font-size:14px}
.empty code{background:var(--bg-sidebar);padding:2px 8px;border-radius:4px;font-size:12px}

/* Buttons */
.btn{padding:6px 14px;border:1px solid var(--border-default);border-radius:var(--radius-sm);font-size:11px;cursor:pointer;background:var(--bg-card);color:var(--text-primary);font-weight:600;transition:.15s}
.btn:hover{background:var(--bg-sidebar)}.btn-primary{background:var(--text-link);color:#fff;border-color:var(--text-link)}.btn-primary:hover{opacity:.9}.btn-danger{color:#E05555}
.btn-xs{padding:2px 8px;font-size:10px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:var(--radius-sm);color:#fff;font-size:12px;font-weight:600;z-index:100;animation:slideIn .3s;background:var(--text-primary)}
@keyframes slideIn{from{transform:translateY(15px);opacity:0}to{transform:translateY(0);opacity:1}}

@media(max-width:900px){.sidebar{display:none}.main-inner{padding:24px 20px 60px}.sidebar-toggle{display:none}}
</style>
</head>
<body>

<!-- Sidebar toggle -->
<div class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">◀</div>

<!-- LEFT SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <h2>📓 AI 学习笔记</h2>
    <div class="sub">从基础到实践 · 持续积累</div>
  </div>
  <div class="sidebar-search">
    <input type="text" id="searchInput" placeholder="🔍 搜索笔记..." oninput="renderTree()">
  </div>
  <div class="sidebar-tree" id="sidebarTree"></div>
  <div class="sidebar-foot">
    <button class="btn btn-primary" onclick="addEntry()">➕ 新建</button>
    <button class="btn" onclick="exportAll()">📥 导出</button>
    <button class="btn btn-danger" onclick="deleteCurrent()">🗑</button>
  </div>
</div>

<!-- RIGHT MAIN -->
<div class="main" id="mainScroll">
  <div class="main-inner" id="mainInner">
    <div class="empty">
      <div class="icon">📓</div>
      <h3>选择左侧笔记开始阅读</h3>
      <p>或按 <code>Ctrl+N</code> 新建一篇</p>
    </div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

    question: 'LLM 到底是什么？它跟我手机输入法的"联想词"有什么本质区别？',
    answer: 'LLM = 一个超级强大的"下一词预测器"。\n\n就像你手机输入法的联想功能，只不过 LLM 读了几乎整个互联网的内容，所以它的"联想"能力异常强大，能达到理解和推理的效果。\n\n核心概念：\n\n1. Token（令牌）— AI 的最小文字单位\n   · 1 个 Token ≈ 0.75 个英文单词 ≈ 0.5 个中文字\n   · 模型的收费、上下文长度限制都以 Token 计算\n\n2. Context Window（上下文窗口）— AI 的"短期记忆"\n   · Claude 的上下文窗口：200K tokens（约 15 万英文单词 / 一本小说）\n   · 超出窗口的内容会被"遗忘"\n\n3. Temperature（温度）— 控制 AI 的"创造力"\n   · 0~0.3：严谨、可预测、适合事实性任务\n   · 0.5~0.7：平衡，适合文档起草\n   · 0.8~1.0：有创意、多变、适合头脑风暴\n\n主流模型：Claude(Anthropic) / GPT-4o(OpenAI) / Gemini(Google) / DeepSeek',

    mindmap: 'LLM 大语言模型\n├── 本质：下一词预测器\n│   └── 读了海量文本 → 涌现理解能力\n├── Token\n│   ├── 1 Token ≈ 0.5 中文字\n│   └── 计费 & 记忆的基本单位\n├── Context Window\n│   ├── AI 的"短期记忆"\n│   └── Claude: 200K tokens\n├── Temperature\n│   ├── 0~0.3 → 严谨（代码/数据提取）\n│   ├── 0.5~0.7 → 平衡（文档起草）\n│   └── 0.8~1.0 → 创意（头脑风暴）\n└── 主流模型\n    ├── Claude (Anthropic)\n    ├── GPT-4o (OpenAI)\n    ├── Gemini (Google)\n    └── DeepSeek',

  {

    tags: ['AI', 'LLM', '概念'],
    createdAt: '2026-07-06', updatedAt: '2026-07-07',
    question: 'AI 能做什么？不能做什么？作为 BA，理解 AI 的边界为什么比知道怎么用 AI 更重要？',
    answer: '核心：AI 不是万能的，但不知道它的边界在哪，才是最危险的。\n\nAI 擅长：\n✅ 文本生成与改写（用户故事、验收标准、邮件润色）\n✅ 结构化信息提取（会议记录→待办清单、需求文档→功能点表格）\n✅ 代码生成与辅助（根据描述生成页面、解释代码）\n✅ 分析与推理（需求合理性分析、方案对比）\n✅ 创意和头脑风暴（边缘场景梳理、异常流程）\n\nAI 不擅长：\n❌ 幻觉——一本正经地胡说八道，编造 API、数据、事实\n❌ 缺乏真正理解——没有意图和信念，不理解"为什么"\n❌ 无法执行真实世界操作——不能替你打开 Jira、不能打电话\n❌ 上下文限制——对话太长会"遗忘"早期内容\n❌ 质量不稳定——同一个 Prompt 两次可能不同结果\n\nBA 的不可替代性：你有客户现场的经历、有对公司战略的理解、有和开发吵架的经验——这些 AI 永远不会有。',
    summary: '1. AI 擅长结构化输出（文本、表格、代码）——这正是 BA 日常工作的大部分\n2. 幻觉是最大的风险——对事实性输出保持怀疑，关键信息要求来源\n3. AI 没有业务背景——需要你把隐性知识写进 Prompt\n4. 实用思维模型：这个任务的输出我能不能验证对错？不能验证的，不能完全交给 AI\n5. BA 的核心价值：判断什么场景该用 AI，什么场景不该用',

    answer: 'RAG（检索增强生成）：让 AI 先查资料，再回答问题。\n就像考试时让你先翻书再作答——解决 AI 的知识截止日期和幻觉问题。\n\nAgent（智能体）：能自主使用工具的 AI。\n普通 AI 只能"说话"，Agent 能"做事"。核心循环：思考 → 行动 → 观察结果 → 再思考。\n\nMCP（模型上下文协议）：AI 连接外部工具的"USB 接口标准"。\n让 AI 用统一的方式连接 GitHub、Jira、数据库——就像 USB 让任何设备能插到电脑上。\n\n三者关系：LLM=大脑 / RAG=记忆外挂 / Agent=有手有脚 / MCP=接口标准',

  {

let entries = [];
let currentId = null;
let catStates = {}; // {catName: boolean} - collapsed state

function load() {
  try {
    entries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || DEFAULT_ENTRIES;
    if (!localStorage.getItem(STORAGE_KEY)) localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  } catch(e) { entries = [...DEFAULT_ENTRIES]; }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }

// ===== TREE =====
function renderTree() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  const tree = document.getElementById('sidebarTree');
  let html = '';

  NAV_STRUCTURE.forEach(group => {
    const catNotes = entries.filter(e => e.cat === group.cat && (!q || matchSearch(e, q)));
    const collapsed = catStates[group.cat] || false;
    html += `<div class="cat-item${collapsed?' collapsed':''}" onclick="toggleCat('${group.cat}')"><span class="cat-arrow">▼</span> ${group.cat}</div>`;
    html += `<div class="cat-children${collapsed?' collapsed':''}">`;

    group.subcats.forEach(sub => {
      const subNotes = catNotes.filter(e => e.subcat === sub.name);
      const subCollapsed = catStates[group.cat+'||'+sub.name] || false;
      const noteIds = sub.notes || [];
      const allSubNotes = [...subNotes, ...noteIds.map(id => entries.find(e => e.id === id)).filter(Boolean)];
      const unique = [...new Map(allSubNotes.map(e => [e.id, e])).values()];

      if (unique.length === 0 && !q) return;
      html += `<div class="sub-item${subCollapsed?' collapsed':''}" onclick="toggleSub('${group.cat}||${sub.name}')"><span class="sub-arrow">▼</span> ${sub.name} <span style="font-size:10px;color:var(--text-tertiary);margin-left:auto">${unique.length}</span></div>`;
      html += `<div class="sub-children${subCollapsed?' collapsed':''}">`;
      unique.forEach(e => {
        html += `<div class="note-item${currentId===e.id?' active':''}" onclick="selectEntry('${e.id}')">
          <span class="dot" style="background:${tagDot(e.tags[0])}"></span>
          <span>${e.title}</span>
        </div>`;
      });
      html += '</div>';
    });
    html += '</div>';
  });

  tree.innerHTML = html || '<div style="padding:24px;text-align:center;color:var(--text-tertiary);font-size:12px">无匹配笔记</div>';
}

function matchSearch(e, q) {
  return e.title.toLowerCase().includes(q) || e.question.toLowerCase().includes(q) || e.summary.toLowerCase().includes(q) || (e.tags||[]).some(t=>t.toLowerCase().includes(q));
}

function toggleCat(name) { catStates[name] = !catStates[name]; renderTree(); }
function toggleSub(name) { catStates[name] = !catStates[name]; renderTree(); }
function tagDot(t) { const m={'AI':'#5B8DEF','LLM':'#4CAF92','Prompt':'#E5A853','Agent':'#8B7EC8','产品':'#E5A853','PM':'#8B7EC8','测试':'#E05555'}; return m[t]||'#9CA3AF'; }

// ===== SELECT =====
function selectEntry(id) {
  saveCurrent();
  currentId = id;
  const e = entries.find(x => x.id === id);
  if (!e) return;
  // Expand nav to show this entry
  if (e.cat) catStates[e.cat] = false;
  if (e.subcat) catStates[e.cat+'||'+e.subcat] = false;
  renderTree();
  renderEntry(e);
}

function renderEntry(e) {
  document.getElementById('mainInner').innerHTML = `
    <div class="breadcrumb">${e.cat} › ${e.subcat}</div>
    <input class="entry-title" id="entryTitle" value="${e.title.replace(/"/g,'&quot;')}" onchange="saveCurrent()" oninput="updateTitle()">
    <div class="entry-meta">
      <span>📅 ${e.updatedAt}</span>
      <span class="sep">|</span>
      <span>${e.cat}</span>
      <span class="sep">|</span>
      <span style="cursor:pointer" onclick="addTagToCurrent()">🏷 标签</span>
    </div>

    <div class="block block-q">
      <div class="block-title">💬 问题</div>
      <div class="block-body"><textarea id="fldQ" oninput="autoSave()" placeholder="这个笔记要回答什么问题？">${e.question||''}</textarea></div>
    </div>

    <div class="block block-a">
      <div class="block-title">💡 回答</div>
      <div class="block-body"><textarea id="fldA" oninput="autoSave()" placeholder="核心回答...">${e.answer||''}</textarea></div>
    </div>

    <div class="block block-s">
      <div class="block-title">📋 总结</div>
      <div class="block-body"><textarea id="fldS" oninput="autoSave()" placeholder="提炼的核心要点...">${e.summary||''}</textarea></div>
    </div>

    <div class="block block-m">
      <div class="block-title">🧠 脑图</div>
      ${e.mindmap ? `<div class="mindmap-tree">${e.mindmap}</div>` : '<div style="font-size:13px;color:var(--text-tertiary);padding:8px 0">暂无脑图，在下方用树形结构编写</div>'}
      <textarea class="mindmap-edit" id="fldM" oninput="autoSave()" placeholder="用树形结构画脑图：
核心主题
├── 分支1
│   ├── 子节点A
│   └── 子节点B
└── 分支2">${e.mindmap||''}</textarea>
    </div>

    <div class="block block-d">
      <div class="block-title">🔬 深化</div>
      <div class="block-body"><textarea id="fldD" oninput="autoSave()" placeholder="延伸思考、关联概念、后续方向...">${e.deepDive||''}</textarea></div>
    </div>

    <div class="tag-row">
      ${(e.tags||[]).map(t => `<span class="tag" onclick="removeTag('${t}')" title="点击移除">${t} ×</span>`).join('')}
      <span style="font-size:11px;color:var(--text-link);cursor:pointer" onclick="addTagToCurrent()">+ 标签</span>
    </div>

    <div class="page-nav">
      <span>${getPrevLink(e)}</span>
      <span>${getNextLink(e)}</span>
    </div>
  `;
}

function getPrevLink(e) {
  const idx = entries.indexOf(e);
  if (idx <= 0) return '<span class="disabled">← 已是第一篇</span>';
  const prev = entries[idx-1];
  return `<a onclick="selectEntry('${prev.id}')">← ${prev.title}</a>`;
}
function getNextLink(e) {
  const idx = entries.indexOf(e);
  if (idx >= entries.length-1) return '<span class="disabled">已是最后一篇 →</span>';
  const next = entries[idx+1];
  return `<a onclick="selectEntry('${next.id}')">${next.title} →</a>`;
}

// ===== SAVE =====
let saveTimer;
function autoSave() { clearTimeout(saveTimer); saveTimer = setTimeout(() => saveCurrent(), 600); }
function updateTitle() {
  if (!currentId) return;
  const e = entries.find(x => x.id === currentId);
  if (!e) return;
  e.title = document.getElementById('entryTitle').value.trim() || '未命名';
  save(); renderTree();
}
function saveCurrent() {
  if (!currentId) return;
  const e = entries.find(x => x.id === currentId);
  if (!e) return;
  e.title = document.getElementById('entryTitle')?.value?.trim() || e.title;
  const f = id => { const el = document.getElementById(id); return el ? el.value : ''; };
  e.question = f('fldQ'); e.answer = f('fldA'); e.summary = f('fldS');
  e.mindmap = f('fldM'); e.deepDive = f('fldD');
  e.updatedAt = new Date().toISOString().slice(0,10);
  save();
}

// ===== CRUD =====
function addEntry() {
  saveCurrent();
  const id = 'n' + Date.now();
  const now = new Date().toISOString().slice(0,10);
  entries.push({ id, title:'新笔记', cat:'📖 AI文档参考', subcat:'模板 & 速查', tags:[], createdAt:now, updatedAt:now, question:'', answer:'', summary:'', mindmap:'', deepDive:'' });
  save();
  selectEntry(id);
  document.getElementById('entryTitle').focus(); document.getElementById('entryTitle').select();
}
function deleteCurrent() {
  if (!currentId || !confirm('删除这篇笔记？')) return;
  entries = entries.filter(e => e.id !== currentId);
  currentId = null; save();
  document.getElementById('mainInner').innerHTML = '<div class="empty"><div class="icon">📓</div><h3>选择左侧笔记开始阅读</h3></div>';
  renderTree();
}
function addTagToCurrent() {
  if (!currentId) return;
  const t = prompt('标签（逗号分隔）：');
  if (!t) return;
  const e = entries.find(x => x.id === currentId);
  if (!e) return;
  e.tags = [...new Set([...(e.tags||[]), ...t.split(',').map(s=>s.trim()).filter(Boolean)])];
  save(); selectEntry(currentId);
}
function removeTag(tag) {
  if (!currentId) return;
  const e = entries.find(x => x.id === currentId);
  if (!e) return;
  e.tags = (e.tags||[]).filter(t => t !== tag);
  save(); selectEntry(currentId);
}

// ===== SIDEBAR TOGGLE =====
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
  document.getElementById('sidebarToggle').classList.toggle('shifted');
  document.getElementById('sidebarToggle').textContent =
    document.getElementById('sidebar').classList.contains('collapsed') ? '▶' : '◀';
}

// ===== EXPORT =====
function exportAll() {
  let md = '# 📓 AI 学习笔记\n\n';
  NAV_STRUCTURE.forEach(group => {
    md += `## ${group.cat}\n\n`;
    group.subcats.forEach(sub => {
      const ids = sub.notes || [];
      const notes = ids.map(id => entries.find(e => e.id === id)).filter(Boolean);
      if (notes.length === 0) return;
      md += `### ${sub.name}\n\n`;
      notes.forEach(e => {
        md += `#### ${e.title}\n\n**标签**: ${(e.tags||[]).join(', ')} | **更新**: ${e.updatedAt}\n\n`;
        md += `> ❓ ${e.question}\n\n${e.answer}\n\n**总结**\n\n${e.summary}\n\n`;
        if (e.mindmap) md += `**脑图**\n\n\`\`\`\n${e.mindmap}\n\`\`\`\n\n`;
        if (e.deepDive) md += `**深化**\n\n${e.deepDive}\n\n`;
        md += '---\n\n';
      });
    });
  });
  const blob = new Blob([md], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ai-learning-notes-' + new Date().toISOString().slice(0,10) + '.md';
  a.click();
  toast('导出完成');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast';
  t.classList.remove('hidden');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.add('hidden'), 1800);
}

// ===== INIT =====
load();
renderTree();
if (entries.length > 0) selectEntry(entries[entries.length-1].id);

document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'n') { e.preventDefault(); addEntry(); }
});
</script>
